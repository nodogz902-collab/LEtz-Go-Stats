  async save(matchId,blob){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('videos','readwrite');tx.objectStore('videos').put({matchId,blob,savedAt:Date.now()});tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});},
  async get(matchId){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('videos','readonly');const req=tx.objectStore('videos').get(matchId);req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);});},

function generateSlots(config){
  const s=[];
  Object.entries(config).forEach(([type,count])=>{
    for(let i=1;i<=count;i++)
      s.push({id:`${type}${i}`,type,
        label:count>1?`${POSITION_TYPES[type].label} ${i}`:POSITION_TYPES[type].label,
        short:count>1?`${POSITION_TYPES[type].short}${i}`:POSITION_TYPES[type].short});
  });
  return s;
}

function getLineupForRotation(startingLineup,rotation){
  const cw=[1,6,5,4,3,2];const lineup={};
  Object.entries(startingLineup).forEach(([pos,slotId])=>{
    const idx=cw.indexOf(parseInt(pos));
    lineup[cw[(idx+(rotation-1))%6]]=slotId;
  });
  return lineup;
}
function setterRotToInternal(r){return{1:1,2:6,3:5,4:4,5:3,6:2}[r]||1;}
function getEffectiveLineup(lineupSnapshot,matchSlots,rotation){return getLineupForRotation(lineupSnapshot,rotation);}
function getSlotSuggestions(action,lineup,servingTeam='us'){
  if(!action||!action.forTeam)return{suggested:null,allowed:null};
  const suggested=new Set();const allowed=new Set();
  Object.entries(lineup).forEach(([pos,sid])=>{
    const posNum=parseInt(pos);const type=sid.replace(/\d+$/,'');
    allowed.add(sid);
    if(action.highlight==='server'){if(servingTeam==='us'&&posNum===1)suggested.add(sid);}
    else if(action.highlight==='front'){if(FRONT_POSITIONS.includes(posNum))suggested.add(sid);}
    else if(action.highlight==='back'){if(BACK_POSITIONS.includes(posNum)&&type!=='S'&&type!=='OPP')suggested.add(sid);}
    else if(action.highlight==='receive'){if(type!=='S'&&type!=='OPP')suggested.add(sid);}
    else suggested.add(sid);
  });
  return{suggested,allowed};
}

function SetterLaufwegSVG({startPos,endPos,animated=false}){
  if(!startPos||!endPos)return null;
  const dx=endPos.x-startPos.x,dy=endPos.y-startPos.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<4)return null;
  const ux=dx/dist,uy=dy/dist,px=-uy,py=ux,s=3.2;
  const tip={x:endPos.x-ux*4,y:endPos.y-uy*4};
  const arrow=`${tip.x},${tip.y} ${tip.x-s*ux+s*0.6*px},${tip.y-s*uy+s*0.6*py} ${tip.x-s*ux-s*0.6*px},${tip.y-s*uy-s*0.6*py}`;
  return(
    <svg className="absolute inset-0 pointer-events-none" style={{width:'100%',height:'100%',zIndex:6}} viewBox="0 0 100 100" preserveAspectRatio="none">
      <circle cx={startPos.x} cy={startPos.y} r="5.5" fill="#fbbf2420" stroke="#f59e0b" strokeWidth="0.9" strokeDasharray="2.5,1.5"/>

  );
}

function computeRotationStats(events){
  const s={};for(let r=1;r<=6;r++)s[r]={won:0,lost:0,soWon:0,soTotal:0};
  const wonT=['kill','ace','block','opp_error'],lostT=['error','service_error','block_error','opp_point'];
  events.forEach(e=>{
    const r=e.rotation;if(!r||!s[r])return;
    if(wonT.includes(e.type)){s[r].won++;if(e.serving==='opp'){s[r].soWon++;s[r].soTotal++;}}
    else if(lostT.includes(e.type)){s[r].lost++;if(e.serving==='opp')s[r].soTotal++;}
  });
  return s;
}
function computeSetterDist(events,slots){
  const dist={};
  slots.filter(s=>!['S','L','DS'].includes(s.type)).forEach(s=>{dist[s.id]={slot:s,kills:0};});
  events.filter(e=>e.type==='kill'&&e.slotId&&!e.auto).forEach(e=>{if(dist[e.slotId])dist[e.slotId].kills++;});
  return dist;
}
function computeReceptionEff(matches){
  const bySlot={};
  [...matches].reverse().forEach(m=>{
    if(!m.events)return;
    m.events.filter(e=>['reception_good','reception_bad'].includes(e.type)&&e.slotId).forEach(e=>{
      if(!bySlot[e.slotId])bySlot[e.slotId]={name:m.rosterSnapshot?.[e.slotId]?.name||'?',hist:[]};
      const h=bySlot[e.slotId].hist;
      if(!h.length||h[h.length-1].id!==m.id)h.push({id:m.id,opp:m.opponent,g:0,b:0});
      const c=h[h.length-1];
      if(e.type==='reception_good')c.g++;else c.b++;
    });
  });
  return bySlot;
}
function computeInsights(m,matchSlots){
  const rs=computeRotationStats(m.events);
  const dist=computeSetterDist(m.events,matchSlots);
  const bySlot={};
  m.events.forEach(e=>{if(!e.slotId)return;if(!bySlot[e.slotId])bySlot[e.slotId]={};bySlot[e.slotId][e.type]=(bySlot[e.slotId][e.type]||0)+1;});
  const out=[];
  const rotArr=[1,2,3,4,5,6].map(r=>({r,...rs[r],tot:rs[r].won+rs[r].lost})).filter(d=>d.tot>=3);
  if(rotArr.length){
    const srt=[...rotArr].sort((a,b)=>(b.won/b.tot)-(a.won/a.tot));
    const best=srt[0],worst=srt[srt.length-1];
    out.push({type:'strength',text:`Rotation ${best.r} ist eure stärkste (${Math.round(best.won/best.tot*100)}% Gewinnquote, ${best.tot} Rallies)`});
    if(srt.length>1&&Math.round(worst.won/worst.tot*100)<50)
      out.push({type:'weakness',text:`Rotation ${worst.r} verliert häufig (${Math.round(worst.won/worst.tot*100)}%) → gezielt im Training adressieren`});
    const soArr=rotArr.filter(d=>d.soTotal>=3).sort((a,b)=>(a.soWon/a.soTotal)-(b.soWon/b.soTotal));
    if(soArr.length){const w=soArr[0];const sp=Math.round(w.soWon/w.soTotal*100);if(sp<50)out.push({type:'weakness',text:`Sideout-Problem Rotation ${w.r}: nur ${sp}% bei gegnerischem Aufschlag`});}
  }
  const totK=Object.values(dist).reduce((s,d)=>s+d.kills,0);
  if(totK>=5){
    const top=Object.entries(dist).sort((a,b)=>b[1].kills-a[1].kills)[0];
    const pct=Math.round(top[1].kills/totK*100);const name=m.rosterSnapshot[top[0]]?.name||top[1].slot.short;
    if(pct>55)out.push({type:'info',text:`Z setzt ${pct}% zu ${name} – Variationsarmut, Gegner könnte Muster lesen`});
    else out.push({type:'strength',text:`Setter verteilt ausgewogen – kein Angreifer über 55%`});
  }
  const recP=matchSlots.map(s=>({s,g:bySlot[s.id]?.reception_good||0,b:bySlot[s.id]?.reception_bad||0})).filter(p=>p.g+p.b>=3);
  if(recP.length){
    const srt=[...recP].sort((a,b)=>(b.g/(b.g+b.b))-(a.g/(a.g+a.b)));
    const best=srt[0],worst=srt[srt.length-1];
    const bp=Math.round(best.g/(best.g+best.b)*100),wp=Math.round(worst.g/(worst.g+worst.b)*100);
    out.push({type:'strength',text:`${m.rosterSnapshot[best.s.id]?.name||best.s.short} ist zuverlässigster Annahmespieler (${bp}%)`});
    if(srt.length>1&&wp<45)out.push({type:'weakness',text:`${m.rosterSnapshot[worst.s.id]?.name||worst.s.short} unter Druck in der Annahme (${wp}%) – Gegner könnte ihn gezielt anservieren`});
  }
  return out;
}

  const bySlot={};m.events.forEach(e=>{if(!e.slotId)return;if(!bySlot[e.slotId])bySlot[e.slotId]={};bySlot[e.slotId][e.type]=(bySlot[e.slotId][e.type]||0)+1;});
  const sw=m.setScores.filter(s=>s.teamScore>s.opponentScore).length,sl=m.setScores.length-sw;
  const css=`*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:24px;color:#1f2937;font-size:13px;background:#f9fafb}h2{margin:0 0 12px;font-size:14px;font-weight:800;color:#6d28d9}.hdr{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;padding:20px 24px;border-radius:14px;margin-bottom:16px}.hdr h1{margin:0 0 2px;font-size:22px;font-weight:900}.score{font-size:52px;font-weight:900;margin:6px 0;letter-spacing:-1px}.meta{opacity:.8;font-size:12px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.ins{display:flex;gap:8px;align-items:flex-start;padding:9px 11px;border-radius:9px;margin-bottom:7px;font-size:12px;line-height:1.45}.ins.s{background:#ecfdf5;color:#065f46;border-left:3px solid #10b981}.ins.w{background:#fef2f2;color:#991b1b;border-left:3px solid #ef4444}.ins.i{background:#eff6ff;color:#1e40af;border-left:3px solid #3b82f6}.br{margin-bottom:10px}.bl{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:4px}.bt{height:10px;background:#f3f4f6;border-radius:5px;overflow:hidden}.bf{height:100%;border-radius:5px}table{width:100%;border-collapse:collapse;font-size:11px}th{background:#f8f7ff;padding:6px 8px;font-weight:800;border-bottom:2px solid #e5e7eb;text-align:center}th:first-child{text-align:left}td{padding:5px 8px;border-bottom:1px solid #f3f4f6;text-align:center}td:first-child{text-align:left;font-weight:600}td:nth-child(2){color:#6d28d9;font-weight:700}.g{color:#059669;font-weight:700}.r{color:#dc2626;font-weight:700}.footer{text-align:center;font-size:10px;color:#9ca3af;margin-top:16px;padding-top:12px;border-top:1px solid #e5e7eb}@media print{body{padding:8px;background:#fff}.card{box-shadow:none}}`;
  const rotRows=[1,2,3,4,5,6].map(r=>{const d=rs[r];const tot=d.won+d.lost;const wp=tot>0?Math.round(d.won/tot*100):0;const sp=d.soTotal>0?Math.round(d.soWon/d.soTotal*100):null;return`<div class="br"><div class="bl"><span>Rotation ${r}</span><span style="color:${wp>=50?'#059669':'#dc2626'}">${tot>0?wp+'%':'–'}</span></div><div class="bt"><div class="bf" style="width:${tot>0?Math.max(wp,1):0}%;background:${wp>=50?'#10b981':'#ef4444'}"></div></div><div style="font-size:10px;color:#9ca3af;margin-top:2px">✓${d.won}&nbsp;✗${d.lost}&nbsp;·&nbsp;${tot} Rallies${sp!==null?`&nbsp;·&nbsp;Sideout ${sp}%`:''}</div></div>`;}).join('');
  const totK=Object.values(dist).reduce((s,d)=>s+d.kills,0);
  const distRows=totK>0?Object.entries(dist).sort((a,b)=>b[1].kills-a[1].kills).map(([sid,d])=>{const pct=Math.round(d.kills/totK*100);const name=m.rosterSnapshot[sid]?.name||d.slot.short;return`<div class="br"><div class="bl"><span>${d.slot.short} · ${name}</span><span>${d.kills}× · ${pct}%</span></div><div class="bt"><div class="bf" style="width:${pct}%;background:#6366f1"></div></div></div>`;}).join(''):'<p style="color:#9ca3af;font-size:12px">Keine Kills getracked</p>';
  const playerRows=matchSlots.filter(s=>bySlot[s.id]).map(s=>{const st=bySlot[s.id]||{};const name=m.rosterSnapshot[s.id]?.name||'—';const rt=(st.reception_good||0)+(st.reception_bad||0);const rp=rt>0?Math.round((st.reception_good||0)/rt*100):null;return`<tr><td>${name}</td><td>${s.short}</td><td class="g">${st.kill||0}</td><td>${st.assist||0}</td><td class="g">${st.ace||0}</td><td class="g">${st.block||0}</td><td class="r">${st.error||0}</td><td class="r">${st.service_error||0}</td><td class="r">${st.block_error||0}</td><td>${st.reception_good||0}${rp!==null?` <small style="color:#9ca3af">(${rp}%)</small>`:''}</td><td class="r">${st.reception_bad||0}</td></tr>`;}).join('');
  const insHtml=ins.map(i=>`<div class="ins ${i.type==='strength'?'s':i.type==='weakness'?'w':'i'}"><span style="font-size:16px">${i.type==='strength'?'💪':i.type==='weakness'?'⚠️':'ℹ️'}</span><span>${i.text}</span></div>`).join('');
  const html=`<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"/><title>Report vs ${m.opponent}</title><style>${css}</style></head><body><div class="hdr"><div class="meta">${new Date(m.date).toLocaleDateString('de-DE',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div><h1>Match Report · vs ${m.opponent}</h1><div class="score">${sw}&thinsp;:&thinsp;${sl}&ensp;${sw>sl?'✅':'❌'}</div><div class="meta">Sätze: ${m.setScores.map(s=>`${s.teamScore}–${s.opponentScore}`).join('&ensp;|&ensp;')}</div></div>${ins.length?`<div class="card"><h2>💡 Erkenntnisse & Empfehlungen</h2>${insHtml}</div>`:''}<div class="g2"><div class="card"><h2>🔄 Rotationsanalyse</h2>${rotRows}</div><div class="card"><h2>🎯 Setter-Verteilung</h2>${distRows}</div></div><div class="card"><h2>📊 Spieler-Statistiken</h2><table><tr><th>Spieler</th><th>Pos</th><th>💥Kill</th><th>🤝Ass.</th><th>🎯Ace</th><th>🧱Block</th><th>❌Angr.F</th><th>📉Svc.F</th><th>🚫Blk.F</th><th>✅Ann+</th><th>⚠️Ann−</th></tr>${playerRows}</table></div><div class="footer">Volleyball Coach Tracker · Erstellt ${new Date().toLocaleDateString('de-DE')}</div><script>setTimeout(()=>window.print(),500);<\/script></body></html>`;
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}else alert('Popup geblockt');
}

function OnboardingSpotlight({targetId,stepNum,totalSteps,title,message,actionLabel,onAction,onSkip}){
  const [rect,setRect]=useState(null);
  useEffect(()=>{
    function update(){
      const el=document.getElementById(targetId);
      if(el){
        const r=el.getBoundingClientRect();
        setRect({left:r.left,top:r.top,width:r.width,height:r.height});
        el.scrollIntoView({behavior:'smooth',block:'center'});
      }
    }
    update();
    const t=setTimeout(update,180);
    window.addEventListener('resize',update,{passive:true});
    return()=>{clearTimeout(t);window.removeEventListener('resize',update);};
  },[targetId]);

  if(!rect)return null;

  const pad=10;
  const sl=Math.max(0,rect.left-pad);
  const st=Math.max(0,rect.top-pad);
  const sw=rect.width+pad*2;
  const sh=rect.height+pad*2;
  const tipBelow=rect.top<window.innerHeight*0.52;
  const tipW=272;
  const tipLeft=Math.max(10,Math.min(window.innerWidth-tipW-10,rect.left+rect.width/2-tipW/2));
  const tipTop=tipBelow?st+sh+16:st-148;
  const arrowLeft=Math.max(sl+4,Math.min(sl+sw-20,rect.left+rect.width/2-10));

  return(
    <>
      {/* Spotlight box with dark overlay via box-shadow */}
      <div className="ob-spot fixed pointer-events-none" style={{left:sl,top:st,width:sw,height:sh,borderRadius:18,zIndex:49}}/>
      {/* Bouncing arrow */}
      <div className="fixed pointer-events-none" style={{left:arrowLeft,top:tipBelow?st+sh+2:st-26,zIndex:50,fontSize:22,lineHeight:1,color:'rgba(250,204,21,0.95)'}}>
        <span className="ob-arrow">{tipBelow?'↓':'↑'}</span>
      </div>
      {/* Tooltip card */}
      <div className="fixed bg-white rounded-2xl shadow-2xl pointer-events-auto" style={{left:tipLeft,top:tipTop,width:tipW,zIndex:50,border:'1px solid rgba(124,58,237,0.15)'}}>
        <div className="p-4">
          {/* Step dots */}
          <div className="flex items-center justify-between mb-3">
            <div className="flex gap-1.5 items-center">
              {Array.from({length:totalSteps}).map((_,i)=>(
                <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${i===stepNum-1?'w-5 bg-purple-600':i<stepNum-1?'w-3 bg-purple-300':'w-3 bg-gray-200'}`}/>
              ))}
              <span className="text-[10px] text-gray-400 ml-1 font-bold">{stepNum}/{totalSteps}</span>
            </div>
            <button onClick={onSkip} className="text-gray-300 text-sm leading-none hover:text-gray-500 transition-colors" style={{lineHeight:1}}>✕</button>
          </div>
          <div className="font-black text-gray-800 text-base mb-1 leading-tight">{title}</div>
          <div className="text-sm text-gray-500 mb-3 leading-relaxed">{message}</div>
          <button onClick={onAction} className="w-full bg-gradient-to-r from-purple-600 to-pink-500 text-white p-2.5 rounded-xl font-bold text-sm active:scale-95 shadow-sm">
            {actionLabel}
          </button>
        </div>
      </div>
    </>
  );
}

// ── MatchVideoPlayer ──────────────────────────────────────────────────────────
function MatchVideoPlayer({matchId,events,matchSlots,rosterSnap,matchSetScores,onEventsChange,onSetScoresChange,editMode,onToggleEdit}){
  const [videoUrl,setVideoUrl]=useState(null);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState('');
  const [currentTime,setCurrentTime]=useState(0);
  const [selectedAction,setSelectedAction]=useState(null);
  const [pendingFlash,setPendingFlash]=useState(null);
  const [showScoreEditor,setShowScoreEditor]=useState(false);
  const [draftScores,setDraftScores]=useState([]);
  const videoEl=useRef(null);
  useEffect(()=>{
    let mounted=true;let url=null;
    async function load(){
      try{const rec=await videoDB.get(matchId);if(rec&&rec.blob&&mounted){url=URL.createObjectURL(rec.blob);setVideoUrl(url);}else if(mounted)setErr('Video nicht gefunden');}catch(e){if(mounted)setErr('Fehler: '+e.message);}
      if(mounted)setLoading(false);
    }
    load();
    return()=>{mounted=false;if(url)URL.revokeObjectURL(url);};
  },[matchId]);
  const jumpTo=(sec)=>{if(videoEl.current&&sec!=null){videoEl.current.currentTime=Math.max(0,sec-2);videoEl.current.play().catch(()=>{});}};
  const deleteVideo=async()=>{if(!confirm('Video löschen? Stats bleiben.'))return;try{await videoDB.delete(matchId);setVideoUrl(null);setErr('Video gelöscht');}catch(e){}};
  const [sharing,setSharing]=useState(false);
  const shareVideo=async()=>{
    setSharing(true);
    try{
      const rec=await videoDB.get(matchId);if(!rec||!rec.blob){alert('Video nicht gefunden');setSharing(false);return;}
      const ext=rec.blob.type.includes('mp4')?'mp4':'webm';const filename=`match-${matchId}.${ext}`;
      const tryDownload=()=>{const url=URL.createObjectURL(rec.blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),3000);};
      if(navigator.share){try{await navigator.share({files:[new File([rec.blob],filename,{type:rec.blob.type})],title:'Match Video'});}catch(e){if(e.name==='AbortError'){setSharing(false);return;}tryDownload();}}else tryDownload();
    }catch(e){alert('Fehler: '+e.message);}
    setSharing(false);
  };
  const openScoreEditor=()=>{setDraftScores(matchSetScores?.length?[...matchSetScores]:[{teamScore:0,opponentScore:0}]);setShowScoreEditor(true);};
  const saveScoreEdit=()=>{const cleaned=draftScores.filter(s=>s.teamScore>0||s.opponentScore>0);if(!cleaned.length){alert('Mindestens einen Satz.');return;}onSetScoresChange(cleaned);setShowScoreEditor(false);};
  const updateDraft=(idx,field,val)=>{const n=[...draftScores];if(!n[idx])n[idx]={teamScore:0,opponentScore:0};n[idx][field]=Math.max(0,parseInt(val)||0);setDraftScores(n);};
  const commitAtTime=(details)=>{
    const event={id:Date.now().toString()+Math.random(),set:1,serving:'us',teamScore:0,opponentScore:0,timestamp:Date.now(),videoTime:Math.floor(currentTime),retroactive:true,...details};
    const newEvents=[event];
    if(details.type==='kill'){
      const setterSlot=matchSlots.find(s=>s.type==='S');
      if(setterSlot&&setterSlot.id!==details.slotId&&rosterSnap[setterSlot.id])
        newEvents.push({id:Date.now().toString()+Math.random()+'_a',set:1,serving:'us',videoTime:Math.floor(currentTime),retroactive:true,auto:true,slotId:setterSlot.id,playerName:rosterSnap[setterSlot.id]?.name,slotShort:setterSlot.short,type:'assist',forTeam:true,timestamp:Date.now()});
    }
    onEventsChange([...events,...newEvents].sort((a,b)=>(a.videoTime??0)-(b.videoTime??0)));
    setPendingFlash({slotId:details.slotId});setTimeout(()=>setPendingFlash(null),600);
    setSelectedAction(null);
  };
  const tapPlayerOnVideo=(slotId)=>{
    if(!selectedAction)return;
    const slot=matchSlots.find(s=>s.id===slotId);
    commitAtTime({type:selectedAction.type,slotId,playerName:rosterSnap[slotId]?.name,slotShort:slot?.short,forTeam:true});
  };
  const deleteEvent=(id)=>{if(confirm('Event löschen?'))onEventsChange(events.filter(e=>e.id!==id));};
  if(loading)return<div className="bg-white/95 rounded-2xl p-4 shadow-xl mb-3 text-center text-xs text-gray-500">🎬 Lade Video...</div>;
  if(err||!videoUrl)return<div className="bg-yellow-100 border-2 border-yellow-400 rounded-2xl p-3 mb-3 text-xs text-yellow-800 text-center">🎬 {err||'Kein Video'}</div>;
  const eventsWithTime=events.filter(e=>e.videoTime!=null).sort((a,b)=>a.videoTime-b.videoTime);
  return(
    <div className="bg-white/95 rounded-2xl p-3 shadow-xl mb-3">
      <div className="flex justify-between items-center mb-2">
        <h3 className="font-black text-purple-700">🎬 Match-Video</h3>
        <div className="flex gap-2">
          <button onClick={onToggleEdit} className={`text-xs font-bold px-2 py-1 rounded-lg ${editMode?'bg-green-500 text-white':'bg-gray-200 text-gray-700'}`}>{editMode?'✓ Fertig':'✏️ Nachtracken'}</button>
          {editMode&&<button onClick={openScoreEditor} className="text-xs font-bold px-2 py-1 rounded-lg bg-blue-100 text-blue-700">📊 Score</button>}
          <button onClick={shareVideo} disabled={sharing} className="text-xs font-bold px-2 py-1 rounded-lg bg-indigo-100 text-indigo-700 disabled:opacity-50">{sharing?'…':'⬆️'}</button>
          <button onClick={deleteVideo} className="text-red-500 text-xs p-1"><Trash2 size={14}/></button>
        </div>
      </div>
      {showScoreEditor&&(
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl">
            <h2 className="text-xl font-black text-purple-700 mb-3">📊 Satz-Ergebnisse</h2>
            <div className="space-y-2 mb-3">
              {draftScores.map((s,idx)=>(
                <div key={idx} className="bg-gray-50 rounded-xl p-2">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs font-bold text-gray-600">Satz {idx+1}</span>
                    {draftScores.length>1&&<button onClick={()=>setDraftScores(draftScores.filter((_,i)=>i!==idx))} className="text-red-400 text-xs">✕</button>}
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="flex-1"><div className="text-[10px] text-purple-600 font-bold mb-0.5">WIR</div><input type="number" inputMode="numeric" value={s.teamScore} onChange={e=>updateDraft(idx,'teamScore',e.target.value)} className="w-full p-2 border-2 border-purple-200 rounded-lg text-center text-xl font-black focus:outline-none"/></div>
                    <div className="text-gray-400 font-black mt-4">:</div>
                    <div className="flex-1"><div className="text-[10px] text-orange-600 font-bold mb-0.5">GEGNER</div><input type="number" inputMode="numeric" value={s.opponentScore} onChange={e=>updateDraft(idx,'opponentScore',e.target.value)} className="w-full p-2 border-2 border-orange-200 rounded-lg text-center text-xl font-black focus:outline-none"/></div>
                  </div>
                </div>
              ))}
            </div>
            {draftScores.length<5&&<button onClick={()=>setDraftScores([...draftScores,{teamScore:0,opponentScore:0}])} className="w-full bg-gray-100 text-gray-600 p-2 rounded-xl font-bold text-sm mb-3">+ Satz hinzufügen</button>}
            <div className="flex gap-2">
              <button onClick={()=>setShowScoreEditor(false)} className="flex-1 bg-gray-200 p-3 rounded-2xl font-bold">Abbrechen</button>
              <button onClick={saveScoreEdit} className="flex-1 bg-gradient-to-r from-purple-600 to-pink-500 text-white p-3 rounded-2xl font-bold">Speichern ✓</button>
            </div>
          </div>
        </div>
      )}
      <video ref={videoEl} src={videoUrl} controls playsInline className="w-full rounded-xl mb-2" onTimeUpdate={e=>setCurrentTime(e.target.currentTime)}/>
      {editMode&&(
        <div className="bg-gradient-to-br from-purple-50 to-indigo-50 border-2 border-purple-300 rounded-xl p-2 mb-2">
          <div className="text-[10px] font-bold text-purple-700 mb-2 flex items-center justify-between">
            <span>✏️ NACHTRACKEN · <span className="font-mono bg-purple-200 px-1 rounded">{fmtTime(currentTime)}</span></span>
            <span className="text-gray-500">Pausiere → Aktion → Spieler</span>
          </div>
          {selectedAction&&<div className="bg-purple-700 text-white text-[10px] font-bold px-2 py-1 rounded-lg mb-2 flex items-center justify-between"><span>② {selectedAction.emoji} {selectedAction.label} → Spieler wählen</span><button onClick={()=>setSelectedAction(null)} className="text-purple-200 ml-2">✕</button></div>}
          {!selectedAction&&(
            <>
              <div className="text-[10px] font-bold text-gray-500 mb-1">① AKTION WÄHLEN</div>
              <div className="grid grid-cols-3 gap-1 mb-1">
                {[ACTIONS.find(a=>a.type==='kill'),ACTIONS.find(a=>a.type==='block'),ACTIONS.find(a=>a.type==='ace')].map(a=>(
                  <button key={a.type} onClick={()=>setSelectedAction(a)} className={`${a.color} text-white p-1.5 rounded-lg text-center active:scale-90`}><div className="text-base">{a.emoji}</div><div className="text-[8px] font-bold leading-tight">{a.label}</div></button>
                ))}
              </div>
              <div className="grid grid-cols-3 gap-1 mb-1">
                {[ACTIONS.find(a=>a.type==='error'),ACTIONS.find(a=>a.type==='block_error'),ACTIONS.find(a=>a.type==='service_error')].map(a=>(
                  <button key={a.type} onClick={()=>setSelectedAction(a)} className={`${a.color} text-white p-1.5 rounded-lg text-center active:scale-90`}><div className="text-base">{a.emoji}</div><div className="text-[8px] font-bold leading-tight">{a.label}</div></button>
                ))}
              </div>
              <div className="grid grid-cols-3 gap-1">
                {[ACTIONS.find(a=>a.type==='reception_good'),ACTIONS.find(a=>a.type==='reception_bad'),ACTIONS.find(a=>a.type==='attack_attempt')].map(a=>(
                  <button key={a.type} onClick={()=>setSelectedAction(a)} className={`${a.color} text-white p-1.5 rounded-lg text-center active:scale-90 relative ${a.soft?'opacity-60 border border-dashed border-white/40':''}`}>
                    {a.soft&&<span className="absolute -top-1 -right-1 bg-gray-600 text-white text-[6px] font-black px-0.5 rounded-full leading-none">~stat</span>}
                    <div className="text-base">{a.emoji}</div><div className="text-[8px] font-bold leading-tight">{a.label}</div>
                  </button>
                ))}
              </div>
            </>
          )}
          {selectedAction&&(
            <div className="grid grid-cols-3 gap-1">
              {matchSlots.filter(s=>rosterSnap[s.id]).map(slot=>{
                const p=POSITION_TYPES[slot.type];const isFlashing=pendingFlash?.slotId===slot.id;
                return(
                  <button key={slot.id} onClick={()=>tapPlayerOnVideo(slot.id)}
                    className={`p-1.5 rounded-xl font-bold text-xs active:scale-90 transition-all bg-gradient-to-br ${p.color} text-white shadow-lg ${isFlashing?'scale-110 ring-4 ring-white':''}`}>
                    <div className="font-black">{slot.short}</div>
                    <div className="text-[9px] truncate">{rosterSnap[slot.id]?.name}</div>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      )}
      {eventsWithTime.length>0&&(
        <>
          <div className="text-xs font-bold text-gray-600 mb-1">📍 {eventsWithTime.length} Events</div>
          <div className="space-y-1 max-h-52 overflow-y-auto">
            {eventsWithTime.map(e=>{
              const label=EVENT_LABELS[e.type]||e.type;
              const oe=['kill','ace','block','opp_error'].includes(e.type)?'🟢':['error','service_error','block_error','reception_bad','opp_point'].includes(e.type)?'🔴':'⚪';
              return(
                <div key={e.id} className="flex items-center gap-1.5 bg-gray-50 rounded-lg px-2 py-1 text-xs">
                  <button onClick={()=>jumpTo(e.videoTime)} className="flex-1 flex items-center gap-1.5 text-left active:scale-95">
                    <span className="font-mono text-[10px] text-purple-600 bg-purple-100 px-1 rounded w-10 flex-shrink-0">{fmtTime(e.videoTime)}</span>
                    <span className="flex-1 font-semibold">{oe} {label}</span>
                    <span className="text-gray-400 text-[10px] truncate">{e.slotShort||''} {e.playerName||'—'}</span>
                    {e.retroactive&&<span className="text-[8px] bg-purple-100 text-purple-600 px-1 rounded">retro</span>}
                  </button>
                  {editMode&&<button onClick={()=>deleteEvent(e.id)} className="text-red-400 flex-shrink-0"><Trash2 size={12}/></button>}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function VolleyballTracker(){
  const [view,setView]=useState('home');
  const [teamConfig,setTeamConfig]=useState(DEFAULT_CONFIG);
  const [roster,setRoster]=useState({});
  const [startingLineup,setStartingLineup]=useState({});
  const [receptionFormations,setReceptionFormations]=useState({});
  const [matches,setMatches]=useState([]);
  const [currentMatch,setCurrentMatch]=useState(null);
  const [loading,setLoading]=useState(true);
  const [editingSlot,setEditingSlot]=useState(null);
  const [nameInput,setNameInput]=useState('');
  const [showNewMatch,setShowNewMatch]=useState(false);
  const [opponentName,setOpponentName]=useState('');
  const [viewingMatch,setViewingMatch]=useState(null);
  const [servingTeam,setServingTeam]=useState('us');
  const [showConfig,setShowConfig]=useState(false);
  const [showLineupEditor,setShowLineupEditor]=useState(false);
  const [formationEditRotation,setFormationEditRotation]=useState(1);
  const [showSettings,setShowSettings]=useState(false);
  const [importMessage,setImportMessage]=useState('');
  const [showPasteImport,setShowPasteImport]=useState(false);
  const [pasteText,setPasteText]=useState('');
  const [matchFormat,setMatchFormat]=useState('bo3');
  const [selectedAction,setSelectedAction]=useState(null);
  const [pendingFlash,setPendingFlash]=useState(null);
  const [editingVideo,setEditingVideo]=useState(false);
  const [showBench,setShowBench]=useState(false);
  const [subStep,setSubStep]=useState(null);
  const [recordingEnabled,setRecordingEnabled]=useState(false);
  const [isRecording,setIsRecording]=useState(false);
  const [recordingStart,setRecordingStart]=useState(null);
  const [cameraStream,setCameraStream]=useState(null);
  const [cameraPreviewOpen,setCameraPreviewOpen]=useState(false);
  const [undoStack,setUndoStack]=useState([]);
  const [highlightSuggestions,setHighlightSuggestions]=useState(true);
  // ── Onboarding state ──
  const [onboardingStep,setOnboardingStep]=useState(null);
  const mediaRecorderRef=useRef(null);
  const recordedChunksRef=useRef([]);
  const persistReady=useRef(false);

  useEffect(()=>{
    async function load(){
      try{const c=await storage.get('team_config');if(c)setTeamConfig(JSON.parse(c.value));}catch(e){}
      try{const r=await storage.get('roster_v3');if(r)setRoster(JSON.parse(r.value));}catch(e){}
      try{const l=await storage.get('starting_lineup_v2');if(l)setStartingLineup(JSON.parse(l.value));}catch(e){}
      try{const f=await storage.get('reception_formations_v2');if(f)setReceptionFormations(JSON.parse(f.value));}catch(e){}
      try{const m=await storage.get('matches_v3');if(m)setMatches(JSON.parse(m.value));}catch(e){}
      try{
        const cm=await storage.get('current_match');
        if(cm&&cm.value&&cm.value!=='null'){
          const parsed=JSON.parse(cm.value);setCurrentMatch(parsed);
          const st=await storage.get('serving_team');if(st&&st.value)setServingTeam(st.value);
        }
      }catch(e){}
      // ── Check onboarding ──
      try{
        const od=await storage.get('onboarding_done');
        if(!od)setOnboardingStep(0);
        // else stays null = onboarding done
      }catch(e){setOnboardingStep(0);}
      persistReady.current=true;setLoading(false);
    }
    load();
  },[]);

  // ── Onboarding auto-advance ──
  useEffect(()=>{
    if(onboardingStep===null||onboardingStep<1)return;
    if(view!=='home')return;
    const slots=generateSlots(teamConfig);
    const assigned=slots.filter(s=>roster[s.id]);
    const lc=[1,2,3,4,5,6].every(p=>startingLineup[p]);
    if(onboardingStep===1&&assigned.length>=1){setOnboardingStep(2);return;}
    if(onboardingStep===2&&lc){setOnboardingStep(3);return;}
  },[view,onboardingStep,roster,startingLineup,teamConfig]);

  const finishOnboarding=async()=>{
    setOnboardingStep(null);
    await storage.set('onboarding_done','1');
  };

  useEffect(()=>{if(!persistReady.current)return;storage.set('current_match',currentMatch?JSON.stringify(currentMatch):'null');},[currentMatch]);
  useEffect(()=>{if(!persistReady.current)return;storage.set('serving_team',servingTeam);},[servingTeam]);
  useEffect(()=>{
    if(selectedAction&&(selectedAction.type==='ace'||selectedAction.type==='service_error')&&servingTeam!=='us')
      setSelectedAction(null);
  },[servingTeam]);

  const startRecording=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'environment'},audio:false});
      setCameraStream(stream);
      let mime='video/webm;codecs=vp9';
      if(!MediaRecorder.isTypeSupported(mime))mime='video/webm;codecs=vp8';
      if(!MediaRecorder.isTypeSupported(mime))mime='video/webm';
      if(!MediaRecorder.isTypeSupported(mime))mime='video/mp4';
      if(!MediaRecorder.isTypeSupported(mime))return false;
      recordedChunksRef.current=[];
      const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:1500000});
      rec.ondataavailable=e=>{if(e.data.size>0)recordedChunksRef.current.push(e.data);};
      rec.start(1000);mediaRecorderRef.current=rec;
      setIsRecording(true);setRecordingStart(Date.now());return true;
    }catch(err){return false;}
  };
  const stopRecording=async()=>new Promise(res=>{
    if(!mediaRecorderRef.current){res(null);return;}
    const rec=mediaRecorderRef.current;
    rec.onstop=()=>{
      const blob=new Blob(recordedChunksRef.current,{type:rec.mimeType});
      if(cameraStream)cameraStream.getTracks().forEach(t=>t.stop());
      setCameraStream(null);setIsRecording(false);mediaRecorderRef.current=null;res(blob);
    };
    rec.stop();
  });

  const saveConfig=async c=>{setTeamConfig(c);await storage.set('team_config',JSON.stringify(c));};
  const saveRoster=async r=>{setRoster(r);await storage.set('roster_v3',JSON.stringify(r));};
  const saveLineup=async l=>{setStartingLineup(l);await storage.set('starting_lineup_v2',JSON.stringify(l));};
  const saveFormations=async f=>{setReceptionFormations(f);await storage.set('reception_formations_v2',JSON.stringify(f));};
  const saveMatches=async m=>{setMatches(m);await storage.set('matches_v3',JSON.stringify(m));};

  const buildExportData=()=>({version:1,exportDate:new Date().toISOString(),teamConfig,roster,startingLineup,receptionFormations,matches});
  const applyImportData=async(data)=>{
    if(!data.version)throw new Error('Ungültige Daten');
    if(!confirm('⚠️ Aktuelle Daten überschreiben?'))return false;
    if(data.teamConfig)await saveConfig(data.teamConfig);
    if(data.roster)await saveRoster(data.roster);
    if(data.startingLineup)await saveLineup(data.startingLineup);
    if(data.receptionFormations)await saveFormations(data.receptionFormations);
    if(data.matches)await saveMatches(data.matches);
    return true;
  };
  const exportData=()=>{
    const json=JSON.stringify(buildExportData(),null,2);
    try{const blob=new Blob([json],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`vb-backup-${new Date().toISOString().split('T')[0]}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);setImportMessage('✓ Heruntergeladen');}
    catch(e){setImportMessage('✗ Download fehlgeschlagen');}
    setTimeout(()=>setImportMessage(''),3000);
  };
  const exportCopy=async()=>{
    const b64=btoa(unescape(encodeURIComponent(JSON.stringify(buildExportData()))));
    try{await navigator.clipboard.writeText(b64);setImportMessage('✓ Kopiert');}
    catch(e){setPasteText(b64);setShowPasteImport(true);}
    setTimeout(()=>setImportMessage(''),3000);
  };
  const importFromPaste=async()=>{
    if(!pasteText.trim()){setImportMessage('✗ Kein Text');setTimeout(()=>setImportMessage(''),3000);return;}
    try{
      let json;try{json=decodeURIComponent(escape(atob(pasteText.trim())));}catch{json=pasteText.trim();}
      const ok=await applyImportData(JSON.parse(json));
      if(ok){setImportMessage('✓ Importiert!');setShowPasteImport(false);setPasteText('');}
    }catch(err){setImportMessage('✗ '+err.message);}
    setTimeout(()=>setImportMessage(''),4000);
  };
  const importData=event=>{
    const file=event.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async e=>{
      try{const ok=await applyImportData(JSON.parse(e.target.result));if(ok)setImportMessage('✓ Importiert!');}
      catch(err){setImportMessage('✗ '+err.message);}
      setTimeout(()=>setImportMessage(''),4000);event.target.value='';
    };
    reader.readAsText(file);
  };

  const slots=generateSlots(teamConfig);
  const assignedSlots=slots.filter(s=>roster[s.id]);
  const setPlayerName=(slotId,name)=>{
    const nr={...roster};
    if(!name.trim()){delete nr[slotId];const nl={...startingLineup};Object.entries(nl).forEach(([p,s])=>{if(s===slotId)delete nl[p];});saveLineup(nl);}
    else nr[slotId]={name:name.trim()};
    saveRoster(nr);setEditingSlot(null);setNameInput('');
  };
  const updateConfigCount=(type,delta)=>{const c=teamConfig[type]||0;saveConfig({...teamConfig,[type]:Math.max(0,Math.min(6,c+delta))});};
  const assignToPosition=(pos,slotId)=>{const nl={};Object.entries(startingLineup).forEach(([p,s])=>{if(s!==slotId)nl[p]=s;});nl[pos]=slotId;saveLineup(nl);};
  const lineupComplete=[1,2,3,4,5,6].every(p=>startingLineup[p]);

  const startNewMatch=async()=>{
    if(!opponentName.trim())return;
    let recStarted=false;
    if(recordingEnabled){recStarted=await startRecording();if(!recStarted&&!confirm('Aufnahme fehlgeschlagen. Ohne Video?'))return;}
    const maxSets=matchFormat==='bo1'?1:matchFormat==='bo3'?3:5;
    const setsToWin=matchFormat==='bo1'?1:matchFormat==='bo3'?2:3;
    const match={id:Date.now().toString(),opponent:opponentName.trim(),date:new Date().toISOString(),events:[],set:1,rotation:1,teamScore:0,opponentScore:0,setScores:[],
      rosterSnapshot:{...roster},lineupSnapshot:{...startingLineup},configSnapshot:{...teamConfig},formationsSnapshot:{...receptionFormations},
      format:matchFormat,maxSets,setsToWin,hasVideo:recStarted,videoStartTime:recStarted?Date.now():null};
    setCurrentMatch(match);setServingTeam('us');setShowNewMatch(false);setOpponentName('');setSelectedAction(null);setUndoStack([]);
    if(recStarted)setCameraPreviewOpen(true);
    // Finish onboarding when first match starts
    finishOnboarding();
    setView('match');
  };
  const updateMatch=fn=>setCurrentMatch(prev=>fn(prev));
  const pushUndo=()=>setUndoStack(prev=>[...prev.slice(-29),{match:currentMatch,servingTeam}]);

  const recordEventForPlayer=(slotId)=>{
    if(!selectedAction||!currentMatch)return;
    const action=selectedAction;
    const matchSlotsLocal=generateSlots(currentMatch.configSnapshot);
    pushUndo();
    const videoTime=isRecording&&recordingStart?Math.floor((Date.now()-recordingStart)/1000):null;
    const slot=matchSlotsLocal.find(s=>s.id===slotId);
    const event={id:Date.now().toString()+Math.random(),slotId:action.forTeam?slotId:null,playerName:action.forTeam?currentMatch.rosterSnapshot[slotId]?.name:null,
      slotShort:action.forTeam?slot?.short:null,type:action.type,forTeam:action.forTeam,
      set:currentMatch.set,rotation:currentMatch.rotation,serving:servingTeam,timestamp:Date.now(),videoTime};
    const eventsToAdd=[event];
    if(action.type==='kill'){
      const setterSlotLocal=matchSlotsLocal.find(s=>s.type==='S');
      if(setterSlotLocal&&setterSlotLocal.id!==slotId&&currentMatch.rosterSnapshot[setterSlotLocal.id])
        eventsToAdd.push({id:Date.now().toString()+Math.random()+'_a',slotId:setterSlotLocal.id,playerName:currentMatch.rosterSnapshot[setterSlotLocal.id]?.name,slotShort:setterSlotLocal.short,type:'assist',forTeam:true,set:currentMatch.set,rotation:currentMatch.rotation,serving:servingTeam,timestamp:Date.now(),videoTime,auto:true});
    }
    let td=0,od=0,rotateUs=false,newServing=servingTeam;
    if(['kill','ace','block'].includes(action.type)){td=1;if(servingTeam==='opp'){rotateUs=true;newServing='us';}}
    if(['error','service_error','block_error','reception_bad'].includes(action.type)){od=1;newServing='opp';}
    updateMatch(m=>({...m,events:[...m.events,...eventsToAdd],teamScore:m.teamScore+td,opponentScore:m.opponentScore+od,rotation:rotateUs?(m.rotation%6)+1:m.rotation}));
    setServingTeam(newServing);
    setPendingFlash({slotId,type:action.type});setTimeout(()=>setPendingFlash(null),600);
    setSelectedAction(null);
  };
  const recordOurPoint=()=>{
    if(!currentMatch)return;pushUndo();
    const videoTime=isRecording&&recordingStart?Math.floor((Date.now()-recordingStart)/1000):null;
    const event={id:Date.now().toString()+Math.random(),type:'opp_error',forTeam:false,set:currentMatch.set,rotation:currentMatch.rotation,serving:servingTeam,timestamp:Date.now(),videoTime};
    const rotateUs=servingTeam==='opp';
    updateMatch(m=>({...m,events:[...m.events,event],teamScore:m.teamScore+1,rotation:rotateUs?(m.rotation%6)+1:m.rotation}));
    setServingTeam('us');
  };
  const recordOppPoint=()=>{
    if(!currentMatch)return;pushUndo();
    const videoTime=isRecording&&recordingStart?Math.floor((Date.now()-recordingStart)/1000):null;
    const event={id:Date.now().toString()+Math.random(),type:'opp_point',forTeam:false,set:currentMatch.set,rotation:currentMatch.rotation,serving:servingTeam,timestamp:Date.now(),videoTime};
    updateMatch(m=>({...m,events:[...m.events,event],opponentScore:m.opponentScore+1}));
    setServingTeam('opp');
  };
  const doSubstitution=(fieldSlotId,benchSlotId)=>{
    pushUndo();
    updateMatch(m=>{
      const newLineup={...m.lineupSnapshot};
      const pos=Object.entries(newLineup).find(([_,s])=>s===fieldSlotId)?.[0];
      if(pos)newLineup[pos]=benchSlotId;
      return{...m,lineupSnapshot:newLineup,substitutions:[...(m.substitutions||[]),{out:fieldSlotId,in:benchSlotId,set:m.set,rotation:m.rotation}]};
    });
    setSubStep(null);setShowBench(false);
  };
  const undoLastEvent=()=>{
    if(!undoStack.length)return;
    const snap=undoStack[undoStack.length-1];
    setCurrentMatch(snap.match);setServingTeam(snap.servingTeam);
    setUndoStack(prev=>prev.slice(0,-1));setSelectedAction(null);
  };
  const manualRotate=()=>{pushUndo();updateMatch(m=>({...m,rotation:(m.rotation%6)+1}));};
  const nextSet=()=>{
    pushUndo();
    updateMatch(m=>({...m,set:m.set+1,setScores:[...m.setScores,{teamScore:m.teamScore,opponentScore:m.opponentScore}],teamScore:0,opponentScore:0,rotation:1}));
    setServingTeam('us');setSelectedAction(null);
  };
  const finishMatch=async()=>{
    let videoBlob=null;if(isRecording)videoBlob=await stopRecording();
    const finalMatch={...currentMatch,setScores:[...currentMatch.setScores,{teamScore:currentMatch.teamScore,opponentScore:currentMatch.opponentScore}],finished:true};
    if(videoBlob){try{await videoDB.save(finalMatch.id,videoBlob);}catch(e){}}
    await saveMatches([finalMatch,...matches]);
    setCurrentMatch(null);setSelectedAction(null);setUndoStack([]);setView('home');
  };
  const cancelMatch=async()=>{
    if(confirm('Spiel verwerfen?')){
      if(isRecording)await stopRecording();
      setCurrentMatch(null);setSelectedAction(null);setUndoStack([]);setView('home');
    }
  };

  if(loading)return(<div className="min-h-screen bg-gradient-to-br from-purple-600 via-pink-500 to-orange-400 flex items-center justify-center"><div className="text-white text-xl font-bold animate-pulse">Lade... 🏐</div></div>);

  // ═══ HOME ═════════════════════════════════════════════════════════════════
  if(view==='home')return(
    <div className="min-h-screen bg-gradient-to-br from-purple-600 via-pink-500 to-orange-400 p-4">
      <div className="max-w-md mx-auto">
        <div className="flex justify-end pt-2"><button onClick={()=>setShowSettings(true)} className="bg-white/20 text-white p-2 rounded-full active:scale-95"><Settings size={18}/></button></div>
        <div className="text-center py-4">
          <div className="text-6xl mb-2">🏐</div>
          <h1 className="text-4xl font-black text-white drop-shadow-lg">Coach Tracker</h1>
          <p className="text-white/90 font-semibold text-sm">Lokal · Offline · 5-1 System</p>
        </div>
        {currentMatch&&(
          <button onClick={()=>setView('match')} className="w-full bg-gradient-to-r from-green-400 to-emerald-500 text-white p-5 rounded-3xl shadow-xl mb-4 font-bold active:scale-95 animate-pulse">
            ▶️ Laufendes Spiel fortsetzen<br/><span className="text-sm opacity-90">vs {currentMatch.opponent} · Satz {currentMatch.set} {isRecording&&'· 🔴 REC'}</span>
          </button>
        )}
        <div className="grid grid-cols-2 gap-3 mb-4">
          <button id="ob-newmatch" onClick={()=>setShowNewMatch(true)} disabled={!lineupComplete} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95 disabled:opacity-50"><div className="text-4xl mb-1">🚀</div><div className="font-black text-purple-700">Neues Spiel</div></button>
          <button id="ob-kader" onClick={()=>setView('roster')} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95"><div className="text-4xl mb-1">👥</div><div className="font-black text-pink-600">Kader</div><div className="text-xs text-gray-500">{assignedSlots.length} Spieler</div></button>
          <button id="ob-lineup" onClick={()=>setView('lineup')} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95"><div className="text-4xl mb-1">📋</div><div className="font-black text-indigo-600">Aufstellung</div><div className="text-xs text-gray-500">{lineupComplete?'✓ Bereit':`${Object.keys(startingLineup).length}/6`}</div></button>
          <button onClick={()=>{setView('formations');setFormationEditRotation(1);}} disabled={!lineupComplete} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95 disabled:opacity-50"><div className="text-4xl mb-1">🎯</div><div className="font-black text-cyan-700">Annahme 5-1</div><div className="text-xs text-gray-500">{Object.keys(receptionFormations).length}/6 gespeichert</div></button>
          <button onClick={()=>setView('stats')} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95 col-span-2"><div className="text-4xl mb-1">📊</div><div className="font-black text-orange-600">Statistiken & Historie</div><div className="text-xs text-gray-500">{matches.length} Spiele</div></button>
        </div>
      </div>

      {/* ── Onboarding Overlays ── */}
      {onboardingStep===0&&(
        <OnboardingWelcome
          onStart={()=>setOnboardingStep(1)}
          onSkip={finishOnboarding}
        />
      )}
      {onboardingStep===1&&(
        <OnboardingSpotlight
          targetId="ob-kader"
          stepNum={1} totalSteps={3}
          title="① Spieler anlegen"
          message="Füge alle Spieler deines Teams hinzu – Namen und Positionen. Das dauert nur 1 Minute."
          actionLabel="Zu Kader →"
          onAction={()=>setView('roster')}
          onSkip={finishOnboarding}
        />
      )}
      {onboardingStep===2&&(
        <OnboardingSpotlight
          targetId="ob-lineup"
          stepNum={2} totalSteps={3}
          title="② Aufstellung festlegen"
          message="Platziere deine 6 Startspieler auf den Positionen 1–6. Danach kann das Tracking beginnen."
          actionLabel="Zu Aufstellung →"
          onAction={()=>setView('lineup')}
          onSkip={finishOnboarding}
        />
      )}
      {onboardingStep===3&&lineupComplete&&(
        <OnboardingSpotlight
          targetId="ob-newmatch"
          stepNum={3} totalSteps={3}
          title="③ Erstes Spiel starten!"
          message="Alles bereit. Tippe hier und gib den Gegner ein – dann geht's los!"
          actionLabel="Spiel starten 🚀"
          onAction={()=>{finishOnboarding();setShowNewMatch(true);}}
          onSkip={finishOnboarding}
        />
      )}

      {showSettings&&(
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50" onClick={()=>setShowSettings(false)}>
          <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
            <h2 className="text-2xl font-black text-gray-800 mb-4">⚙️ Einstellungen</h2>
            <div className="space-y-3">
              <div className="bg-gray-50 p-3 rounded-2xl">
                <div className="text-xs font-bold text-gray-700 mb-2">💾 DATEN-BACKUP</div>
                <div className="grid grid-cols-2 gap-2 mb-2">
                  <button onClick={exportData} className="bg-gradient-to-r from-blue-500 to-cyan-600 text-white p-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 active:scale-95"><Download size={13}/> Download</button>
                  <button onClick={exportCopy} className="bg-gradient-to-r from-indigo-500 to-purple-600 text-white p-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 active:scale-95">📋 Kopieren</button>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <label className="bg-gradient-to-r from-purple-500 to-pink-600 text-white p-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 cursor-pointer"><Upload size={13}/> Datei<input type="file" accept=".json,.txt" onChange={importData} className="hidden"/></label>
                  <button onClick={()=>{setPasteText('');setShowPasteImport(true);}} className="bg-gradient-to-r from-pink-500 to-rose-500 text-white p-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 active:scale-95">📥 Einfügen</button>
                </div>
                {importMessage&&<div className={`mt-2 p-2 rounded-lg text-xs font-bold text-center ${importMessage.startsWith('✓')?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}`}>{importMessage}</div>}
              </div>
              <div className="bg-blue-50 p-3 rounded-2xl">
                <button onClick={async()=>{await storage.set('onboarding_done','');setOnboardingStep(0);setShowSettings(false);}} className="w-full bg-blue-600 text-white p-3 rounded-xl font-bold text-sm">🎓 Onboarding wiederholen</button>
              </div>
              <div className="bg-red-50 p-3 rounded-2xl">

                          {pct}% <span className="text-[10px] font-normal text-gray-400">({tg}+ / {tb}−)</span>
                        </span>
                      </div>
                      <div className="h-2.5 bg-gray-100 rounded-full overflow-hidden mb-2">
                        <div className="h-full bg-gradient-to-r from-lime-400 to-green-500 rounded-full" style={{width:`${pct}%`}}/>
                      </div>
                      <div className="flex gap-1.5 flex-wrap">
                        {d.hist.slice(-8).map((h,j)=>{
                          const t=h.g+h.b;const p=t>0?Math.round(h.g/t*100):0;
                          return(
                            <div key={j} className="flex flex-col items-center gap-0.5" title={`vs ${h.opp}: ${p}%`}>
                              <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[8px] font-black text-white shadow-sm ${p>=60?'bg-green-500':p>=40?'bg-orange-400':'bg-red-400'}`}>{p}</div>
                              <div className="text-[7px] text-gray-400 w-7 truncate text-center">{h.opp?.slice(0,4)}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      </div>
    );
  }
  return null;
}

function FormationsEditor({rotation:setterRotation,setRotation:setSetterRotation,startingLineup,roster,slots,receptionFormations,saveFormations,onBack}){
  const courtRef=useRef(null);
  const [localFormation,setLocalFormation]=useState(()=>receptionFormations[setterRotation]||getDefaultReception());
  const [dirty,setDirty]=useState(false);
  const [draggingPos,setDraggingPos]=useState(null);
  const [activePreset,setActivePreset]=useState(null);
  useEffect(()=>{setLocalFormation(receptionFormations[setterRotation]||getDefaultReception());setDirty(false);},[setterRotation,receptionFormations]);
  const internalRotation=setterRotToInternal(setterRotation);
  const lineup=getLineupForRotation(startingLineup,internalRotation);
  const applyPreset=(key,allRotations)=>{
    const preset=RECEPTION_PRESETS[key];if(!preset)return;
    setActivePreset(key);
    if(allRotations){
      const newF={};[1,6,5,4,3,2].forEach(r=>{if(preset.formations[r])newF[r]=preset.formations[r];});
      saveFormations({...receptionFormations,...newF});
      setLocalFormation(preset.formations[setterRotation]||getDefaultReception());setDirty(false);
    }else{const f=preset.formations[setterRotation];if(f){setLocalFormation(f);setDirty(true);}}
  };
  const handlePointerDown=(pos,e)=>{e.preventDefault();setDraggingPos(pos);};
  const handlePointerMove=e=>{
    if(draggingPos===null||!courtRef.current)return;e.preventDefault();
    const rect=courtRef.current.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    const x=Math.max(5,Math.min(95,((cx-rect.left)/rect.width)*100));
    const y=Math.max(5,Math.min(95,((cy-rect.top)/rect.height)*100));
    setLocalFormation(prev=>({...prev,[draggingPos]:{x,y}}));setDirty(true);setActivePreset(null);
  };
  const handlePointerUp=()=>setDraggingPos(null);
  useEffect(()=>{
    if(draggingPos!==null){
      const move=e=>handlePointerMove(e);const up=()=>handlePointerUp();
      window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
      window.addEventListener('touchmove',move,{passive:false});window.addEventListener('touchend',up);
      return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);window.removeEventListener('touchmove',move);window.removeEventListener('touchend',up);};
    }
  },[draggingPos]);
  const editorSetterStart=COURT_POSITIONS.find(c=>c.pos===setterRotation)||null;
  const editorSetterEnd=localFormation[setterRotation]||null;
  return(
    <div className="min-h-screen bg-gradient-to-br from-cyan-600 via-blue-600 to-indigo-700 p-4">
      <div className="max-w-md mx-auto">
        <div className="flex items-center gap-3 mb-4 pt-2">
          <button onClick={onBack} className="bg-white/20 p-2 rounded-full"><ArrowLeft/></button>
          <div><h1 className="text-2xl font-black text-white">🎯 Annahme-Formation</h1><p className="text-white/70 text-xs">5-1 Läufersystem · Z läuft zu Pos 2</p></div>
        </div>
        <div className="bg-white/95 rounded-2xl p-3 shadow-xl mb-3">
          <div className="text-xs font-bold text-gray-600 mb-2">📐 SYSTEM WÄHLEN</div>
          <div className="grid grid-cols-2 gap-2 mb-2">
            {Object.entries(RECEPTION_PRESETS).map(([key,p])=>(
              <button key={key} onClick={()=>applyPreset(key,false)} className={`p-3 rounded-xl active:scale-90 text-white text-left bg-gradient-to-br ${p.color} transition-all ${activePreset===key?'ring-2 ring-yellow-300 scale-105 shadow-lg':''}`}>
                <div className="text-2xl leading-none mb-1">{p.emoji}</div>
                <div className="font-black text-xs leading-tight">{p.label}</div>
                <div className="text-[9px] opacity-80 font-normal mt-0.5">{p.desc}</div>
              </button>
            ))}
          </div>
          <button onClick={()=>{setLocalFormation(getDefaultReception());setDirty(true);setActivePreset(null);}}
            className={`w-full p-2.5 rounded-xl active:scale-95 transition-all text-left flex items-center gap-2 ${activePreset===null?'bg-gray-700 text-white ring-2 ring-yellow-300':'bg-gray-100 text-gray-700'}`}>
            <span className="text-lg">✏️</span><div><div className="font-black text-xs">Custom / Frei</div><div className="text-[9px] opacity-70">Feld zurücksetzen, selbst einzeichnen</div></div>
          </button>
          {activePreset&&(
            <button onClick={()=>applyPreset(activePreset,true)} className="mt-2 w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white p-2 rounded-xl font-bold text-xs active:scale-95 flex items-center justify-center gap-1.5">
              🔄 „{RECEPTION_PRESETS[activePreset].label}" → alle 6 Rotationen
            </button>
          )}
        </div>
        <div className="bg-white/95 rounded-2xl p-3 shadow-xl mb-3">
          <div className="text-xs font-bold text-gray-600 mb-1">Z (ZUSPIELER) STARTET AUF POSITION:</div>
          <div className="text-[10px] text-gray-400 mb-2">Gestrichelte Linie = Laufweg des Zuspielers zur Zuspielzone</div>
          <div className="grid grid-cols-6 gap-1">
            {[1,6,5,4,3,2].map((n,idx)=>{
              const saved=receptionFormations[n];
              return(
                <button key={n} onClick={()=>setSetterRotation(n)} className={`p-2 rounded-xl font-black text-sm transition relative ${setterRotation===n?'bg-gradient-to-br from-yellow-400 to-orange-500 text-white shadow-lg scale-105':'bg-gray-100 text-gray-700'}`}>
                  <div className="text-[9px] opacity-70 font-normal">{idx+1}.</div>{n}
                  {saved&&<div className="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>}
                </button>
              );
            })}
          </div>
        </div>
        <div className="bg-white/95 rounded-2xl p-3 shadow-xl mb-3">
          <div className="text-xs font-bold text-cyan-800 mb-1 text-center">✋ Spieler ziehen · Laufweg Z wird automatisch angezeigt</div>
          <div ref={courtRef} className="relative bg-gradient-to-b from-orange-100 via-yellow-50 to-orange-100 rounded-xl border-2 border-orange-400 overflow-hidden touch-none" style={{height:'420px'}}>
            <div className="absolute top-0 left-0 right-0 h-1 bg-gray-700"></div>
            <div className="absolute top-1 left-0 right-0 text-center text-[9px] font-bold text-gray-600">— NETZ —</div>
            <div className="absolute top-[47%] left-0 right-0 border-t-2 border-dashed border-orange-400"></div>
            <SetterLaufwegSVG startPos={editorSetterStart} endPos={editorSetterEnd} animated={false}/>
            <div className="absolute pointer-events-none z-4" style={{left:`${SETTER_TARGET.x}%`,top:`${SETTER_TARGET.y}%`,transform:'translate(-50%,-50%)'}}>
              <div className="w-8 h-8 rounded-full border-2 border-dashed border-yellow-500/60 flex items-center justify-center"><span className="text-[8px] font-black text-yellow-700">Z♟</span></div>
            </div>
            {Object.entries(lineup).map(([pos,slotId])=>{
              const posNum=parseInt(pos);const slot=slots.find(s=>s.id===slotId);if(!slot)return null;
              const p=POSITION_TYPES[slot.type];const player=roster[slotId];
              const coords=localFormation[posNum]||{x:50,y:50};const isDragging=draggingPos===posNum;
              return(
                <div key={pos} onMouseDown={e=>handlePointerDown(posNum,e)} onTouchStart={e=>handlePointerDown(posNum,e)}
                  className="absolute transform -translate-x-1/2 -translate-y-1/2 z-10 cursor-grab active:cursor-grabbing select-none"
                  style={{left:`${coords.x}%`,top:`${coords.y}%`,transition:isDragging?'none':'all 0.3s ease',touchAction:'none'}}>
                  <div className={`relative ${isDragging?'scale-110':''}`}>
                    <div className={`w-[60px] h-[60px] bg-gradient-to-br ${p.color} rounded-full flex flex-col items-center justify-center text-white shadow-xl ${isDragging?'ring-4 ring-white':''}`}>
                      {slot.type==='S'&&<div className="absolute -top-1 -right-1"><Star size={10} fill="#fbbf24"/></div>}
                      <div className="text-[11px] font-black">{slot.short}</div>
                    </div>
                    {player&&<div className="text-[10px] text-center font-black text-gray-900 mt-1 max-w-[70px] truncate bg-white/90 rounded px-1 pointer-events-none">{player.name}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <button onClick={()=>{if(confirm('Reset?')){setLocalFormation(getDefaultReception());setDirty(true);setActivePreset(null);}}} className="bg-gray-200 text-gray-700 p-3 rounded-2xl font-bold active:scale-95 flex items-center justify-center gap-2"><RefreshCw size={16}/> Reset</button>
          <button onClick={()=>{saveFormations({...receptionFormations,[setterRotation]:localFormation});setDirty(false);}} disabled={!dirty} className="bg-gradient-to-r from-green-500 to-emerald-600 text-white p-3 rounded-2xl font-bold active:scale-95 disabled:opacity-40 flex items-center justify-center gap-2"><Save size={16}/> Speichern</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<VolleyballTracker/>);
</script>
</body>
</html>
