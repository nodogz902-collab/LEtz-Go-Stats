<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Volleyball Coach Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html,body{margin:0;padding:0;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
    *{-webkit-user-select:none;user-select:none;}
    input,textarea{-webkit-user-select:text;user-select:text;}
    @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(250,204,21,0.7)}70%{box-shadow:0 0 0 10px rgba(250,204,21,0)}100%{box-shadow:0 0 0 0 rgba(250,204,21,0)}}
    .highlight-pulse{animation:pulse-ring 1.2s infinite;}
    .player-dim{opacity:0.22;filter:saturate(0.2);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ── Storage ───────────────────────────────────────────────────────────────────
const storage = {
  async get(k){try{const v=localStorage.getItem('vbt_'+k);return v?{value:v}:null;}catch(e){return null;}},
  async set(k,v){try{localStorage.setItem('vbt_'+k,v);return{value:v};}catch(e){return null;}},
};
const videoDB = {
  async open(){return new Promise((res,rej)=>{const req=indexedDB.open('CoachVideos',1);req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains('videos'))db.createObjectStore('videos',{keyPath:'matchId'});};req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);});},
  async save(matchId,blob){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('videos','readwrite');tx.objectStore('videos').put({matchId,blob,savedAt:Date.now()});tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});},
  async get(matchId){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('videos','readonly');const req=tx.objectStore('videos').get(matchId);req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);});},
  async delete(matchId){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('videos','readwrite');tx.objectStore('videos').delete(matchId);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});},
};

// ── Icons ─────────────────────────────────────────────────────────────────────
const Icon=({children,size=16})=><svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>;
const ArrowLeft=({size})=><Icon size={size}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></Icon>;
const RotateCw=({size})=><Icon size={size}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></Icon>;
const Trash2=({size})=><Icon size={size}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>;
const Star=({size,fill})=><Icon size={size}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill={fill||'none'}/></Icon>;
const Save=({size})=><Icon size={size}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
const RefreshCw=({size})=><Icon size={size}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></Icon>;
const Download=({size})=><Icon size={size}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
const Upload=({size})=><Icon size={size}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
const Settings=({size})=><Icon size={size}><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"/></Icon>;

// ── Constants ─────────────────────────────────────────────────────────────────
const POSITION_TYPES={
  S:{label:'Setter / Zuspieler',color:'from-yellow-400 to-orange-500',short:'Z'},
  OPP:{label:'Opposite / Diagonal',color:'from-red-500 to-pink-600',short:'D'},
  OH:{label:'Outside / Außen',color:'from-blue-500 to-cyan-600',short:'AA'},
  MB:{label:'Middle / Mittel',color:'from-purple-500 to-indigo-600',short:'MB'},
  L:{label:'Libero',color:'from-gray-600 to-gray-800',short:'L'},
  DS:{label:'Defensive Spec.',color:'from-green-600 to-teal-700',short:'DS'},
};
const DEFAULT_CONFIG={S:1,OPP:1,OH:2,MB:2,L:1,DS:0};
const ACTIONS=[
  {type:'kill',       emoji:'💥',label:'Kill',       color:'bg-gradient-to-br from-green-500 to-emerald-600',  forTeam:true, highlight:'front', isPoint:true},
  {type:'block',      emoji:'🧱',label:'Stuff',      color:'bg-gradient-to-br from-purple-500 to-indigo-600',  forTeam:true, highlight:'front', isPoint:true},
  {type:'ace',        emoji:'🎯',label:'Ace',         color:'bg-gradient-to-br from-blue-500 to-cyan-600',      forTeam:true, highlight:'server',isPoint:true},
  {type:'error',      emoji:'❌',label:'Angriff-F.',  color:'bg-gradient-to-br from-red-500 to-rose-600',       forTeam:true, highlight:'front', isPoint:false},
  {type:'block_error',emoji:'🚫',label:'Block-F.',    color:'bg-gradient-to-br from-red-600 to-pink-700',       forTeam:true, highlight:'front', isPoint:false},
  {type:'service_error',emoji:'📉',label:'Svc-F.',   color:'bg-gradient-to-br from-orange-500 to-red-500',     forTeam:true, highlight:'server',isPoint:false},
  {type:'reception_bad',emoji:'⚠️',label:'Ann. -',   color:'bg-gradient-to-br from-amber-500 to-orange-600',   forTeam:true, highlight:'receive',isPoint:false},
  {type:'reception_good',emoji:'✅',label:'Ann. +',  color:'bg-gradient-to-br from-lime-500 to-green-600',     forTeam:true, highlight:'receive',isPoint:false, soft:true},
  {type:'attack_attempt',emoji:'⚔️',label:'Angr.v.',color:'bg-gradient-to-br from-teal-500 to-cyan-500',      forTeam:true, highlight:'front', isPoint:false, soft:true},
];
const EVENT_LABELS={kill:'💥 Kill',ace:'🎯 Ace',block:'🧱 Stuff',error:'❌ Angriff-F.',service_error:'📉 Svc-F.',block_error:'🚫 Block-F.',attack_attempt:'⚔️ Angriffsv.',opp_point:'🆚 +1 Gegner',opp_error:'🎁 Geg.-Fehler',reception_good:'✅ Ann.+',reception_bad:'⚠️ Ann.-'};
const COURT_POSITIONS=[
  {pos:4,x:18,y:28,label:'LF'},{pos:3,x:50,y:28,label:'MF'},{pos:2,x:82,y:28,label:'RF'},
  {pos:5,x:18,y:72,label:'LB'},{pos:6,x:50,y:72,label:'MB'},{pos:1,x:82,y:72,label:'RB'},
];
const FRONT_POSITIONS=[2,3,4];
const BACK_POSITIONS=[1,5,6];

// ── Helpers ───────────────────────────────────────────────────────────────────
function generateSlots(config){
  const s=[];
  Object.entries(config).forEach(([type,count])=>{
    for(let i=1;i<=count;i++)
      s.push({id:`${type}${i}`,type,
        label:count>1?`${POSITION_TYPES[type].label} ${i}`:POSITION_TYPES[type].label,
        short:count>1?`${POSITION_TYPES[type].short}${i}`:POSITION_TYPES[type].short});
  });
  return s;
}
function getDefaultReception(){
  return{1:{x:75,y:40},2:{x:30,y:62},3:{x:50,y:22},4:{x:20,y:25},5:{x:55,y:68},6:{x:80,y:68}};
}
function getLineupForRotation(startingLineup,rotation){
  const cw=[1,6,5,4,3,2];const lineup={};
  Object.entries(startingLineup).forEach(([pos,slotId])=>{
    const idx=cw.indexOf(parseInt(pos));
    lineup[cw[(idx+(rotation-1))%6]]=slotId;
  });
  return lineup;
}
function setterRotToInternal(r){return{1:1,2:6,3:5,4:4,5:3,6:2}[r]||1;}
function getEffectiveLineup(lineupSnapshot,matchSlots,rotation){
  return getLineupForRotation(lineupSnapshot,rotation);
}
function getSlotSuggestions(action,lineup,servingTeam='us'){
  if(!action||!action.forTeam)return{suggested:null,allowed:null};
  const suggested=new Set();
  const allowed=new Set();
  Object.entries(lineup).forEach(([pos,sid])=>{
    const posNum=parseInt(pos);
    const type=sid.replace(/\d+$/,'');
    allowed.add(sid);
    if(action.highlight==='none'){suggested.add(sid);}
    else if(action.highlight==='server'){
      // Ace / Svc-F nur sinnvoll wenn WIR aufschlagen
      if(servingTeam==='us'&&posNum===1)suggested.add(sid);
    }
    else if(action.highlight==='front'){if(FRONT_POSITIONS.includes(posNum))suggested.add(sid);}
    else if(action.highlight==='back'){
      if(BACK_POSITIONS.includes(posNum)&&type!=='S'&&type!=='OPP')suggested.add(sid);
    }
    else if(action.highlight==='receive'){
      // Im 5-1: alle außer Setter (und Diagonal) empfangen
      if(type!=='S'&&type!=='OPP')suggested.add(sid);
    }
  });
  return{suggested,allowed};
}
function fmtTime(s){const m=Math.floor(s/60);return`${m}:${Math.floor(s%60).toString().padStart(2,'0')}`;}

// ── MatchVideoPlayer ──────────────────────────────────────────────────────────
function MatchVideoPlayer({matchId,events,matchSlots,rosterSnap,matchSetScores,onEventsChange,onSetScoresChange,editMode,onToggleEdit}){
  const [videoUrl,setVideoUrl]=useState(null);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState('');
  const [currentTime,setCurrentTime]=useState(0);
  const [selectedAction,setSelectedAction]=useState(null);
  const [pendingFlash,setPendingFlash]=useState(null);
  const [pendingOverride,setPendingOverride]=useState(null);
  const [showScoreEditor,setShowScoreEditor]=useState(false);
  const [draftScores,setDraftScores]=useState([]);
  const videoEl=useRef(null);
  useEffect(()=>{
    let mounted=true;let url=null;
    async function load(){
      try{const rec=await videoDB.get(matchId);if(rec&&rec.blob&&mounted){url=URL.createObjectURL(rec.blob);setVideoUrl(url);}else if(mounted)setErr('Video nicht gefunden');}catch(e){if(mounted)setErr('Fehler: '+e.message);}
      if(mounted)setLoading(false);
    }
    load();
    return()=>{mounted=false;if(url)URL.revokeObjectURL(url);};
  },[matchId]);
  const jumpTo=(sec)=>{if(videoEl.current&&sec!=null){videoEl.current.currentTime=Math.max(0,sec-2);videoEl.current.play().catch(()=>{});}};
  const deleteVideo=async()=>{if(!confirm('Video löschen? Stats bleiben.'))return;try{await videoDB.delete(matchId);setVideoUrl(null);setErr('Video gelöscht');}catch(e){}};
  const [sharing,setSharing]=useState(false);
  const shareVideo=async()=>{
    setSharing(true);
    try{
      const rec=await videoDB.get(matchId);
      if(!rec||!rec.blob){alert('Video nicht gefunden');setSharing(false);return;}
      const ext=rec.blob.type.includes('mp4')?'mp4':'webm';
      const filename=`match-${matchId}.${ext}`;
      const tryDownload=()=>{const url=URL.createObjectURL(rec.blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),3000);};
      if(navigator.share){
        try{const file=new File([rec.blob],filename,{type:rec.blob.type});await navigator.share({files:[file],title:'Match Video'});}
        catch(e){if(e.name==='AbortError'){setSharing(false);return;}try{const url=URL.createObjectURL(rec.blob);await navigator.share({url,title:'Match Video'});setTimeout(()=>URL.revokeObjectURL(url),3000);}catch(e2){if(e2.name!=='AbortError')tryDownload();}}
      }else{tryDownload();}
    }catch(e){alert('Fehler: '+e.message);}
    setSharing(false);
  };
  const openScoreEditor=()=>{setDraftScores(matchSetScores&&matchSetScores.length>0?[...matchSetScores]:[{teamScore:0,opponentScore:0}]);setShowScoreEditor(true);};
  const saveScoreEdit=()=>{const cleaned=draftScores.filter(s=>s.teamScore>0||s.opponentScore>0);if(cleaned.length===0){alert('Mindestens einen Satz eintragen.');return;}onSetScoresChange(cleaned);setShowScoreEditor(false);};
  const updateDraft=(idx,field,val)=>{const n=[...draftScores];if(!n[idx])n[idx]={teamScore:0,opponentScore:0};n[idx][field]=Math.max(0,parseInt(val)||0);setDraftScores(n);};
  const commitAtTime=(details)=>{
    const event={id:Date.now().toString()+Math.random(),set:1,serving:'us',teamScore:0,opponentScore:0,timestamp:Date.now(),videoTime:Math.floor(currentTime),retroactive:true,...details};
    onEventsChange([...events,event].sort((a,b)=>(a.videoTime??0)-(b.videoTime??0)));
    setPendingFlash({slotId:details.slotId,type:details.type});setTimeout(()=>setPendingFlash(null),600);
    setSelectedAction(null);
  };
  const tapPlayerOnVideo=(slotId)=>{
    if(!selectedAction)return;
    const fakeLineup={};matchSlots.forEach((s,i)=>{fakeLineup[i+1]=s.id;});
    const {suggested}=getSlotSuggestions(selectedAction,fakeLineup);
    const isSuggested=!suggested||suggested.has(slotId);
    if(!isSuggested){if(pendingOverride===slotId){setPendingOverride(null);}else{setPendingOverride(slotId);return;}}else{setPendingOverride(null);}
    const slot=matchSlots.find(s=>s.id===slotId);
    commitAtTime({type:selectedAction.type,slotId,playerName:rosterSnap[slotId]?.name,slotShort:slot?.short,forTeam:true});
  };
  const deleteEvent=(id)=>{if(confirm('Event löschen?'))onEventsChange(events.filter(e=>e.id!==id));};
  if(loading)return<div className="bg-white/95 rounded-2xl p-4 shadow-xl mb-3 text-center text-xs text-gray-500">🎬 Lade Video...</div>;
  if(err||!videoUrl)return<div className="bg-yellow-100 border-2 border-yellow-400 rounded-2xl p-3 mb-3 text-xs text-yellow-800 text-center">🎬 {err||'Kein Video'}</div>;
  const eventsWithTime=events.filter(e=>e.videoTime!=null).sort((a,b)=>a.videoTime-b.videoTime);
  return(
    <div className="bg-white/95 rounded-2xl p-3 shadow-xl mb-3">
      <div className="flex justify-between items-center mb-2">
        <h3 className="font-black text-purple-700">🎬 Match-Video</h3>
        <div className="flex gap-2">
          <button onClick={onToggleEdit} className={`text-xs font-bold px-2 py-1 rounded-lg ${editMode?'bg-green-500 text-white':'bg-gray-200 text-gray-700'}`}>{editMode?'✓ Fertig':'✏️ Nachtracken'}</button>
          {editMode&&<button onClick={openScoreEditor} className="text-xs font-bold px-2 py-1 rounded-lg bg-blue-100 text-blue-700">📊 Score</button>}
          <button onClick={shareVideo} disabled={sharing} className="text-xs font-bold px-2 py-1 rounded-lg bg-indigo-100 text-indigo-700 disabled:opacity-50">{sharing?'…':'⬆️'}</button>
          <button onClick={deleteVideo} className="text-red-500 text-xs p-1"><Trash2 size={14}/></button>
        </div>
      </div>
      {showScoreEditor&&(
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl">
            <h2 className="text-xl font-black text-purple-700 mb-1">📊 Satz-Ergebnisse</h2>
            <p className="text-xs text-gray-500 mb-3">Korrigiere die finalen Satz-Stände.</p>
            <div className="space-y-2 mb-3">
              {draftScores.map((s,idx)=>(
                <div key={idx} className="bg-gray-50 rounded-xl p-2">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs font-bold text-gray-600">Satz {idx+1}</span>
                    {draftScores.length>1&&<button onClick={()=>setDraftScores(draftScores.filter((_,i)=>i!==idx))} className="text-red-400 text-xs">✕</button>}
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="flex-1"><div className="text-[10px] text-purple-600 font-bold mb-0.5">WIR</div><input type="number" inputMode="numeric" value={s.teamScore} onChange={e=>updateDraft(idx,'teamScore',e.target.value)} className="w-full p-2 border-2 border-purple-200 rounded-lg text-center text-xl font-black focus:outline-none focus:border-purple-500"/></div>
                    <div className="text-gray-400 font-black mt-4">:</div>
                    <div className="flex-1"><div className="text-[10px] text-orange-600 font-bold mb-0.5">GEGNER</div><input type="number" inputMode="numeric" value={s.opponentScore} onChange={e=>updateDraft(idx,'opponentScore',e.target.value)} className="w-full p-2 border-2 border-orange-200 rounded-lg text-center text-xl font-black focus:outline-none focus:border-orange-500"/></div>
                  </div>
                </div>
              ))}
            </div>
            {draftScores.length<5&&<button onClick={()=>setDraftScores([...draftScores,{teamScore:0,opponentScore:0}])} className="w-full bg-gray-100 text-gray-600 p-2 rounded-xl font-bold text-sm mb-3">+ Satz hinzufügen</button>}
            <div className="flex gap-2">
              <button onClick={()=>setShowScoreEditor(false)} className="flex-1 bg-gray-200 p-3 rounded-2xl font-bold">Abbrechen</button>
              <button onClick={saveScoreEdit} className="flex-1 bg-gradient-to-r from-purple-600 to-pink-500 text-white p-3 rounded-2xl font-bold">Speichern ✓</button>
            </div>
          </div>
        </div>
      )}
      <video ref={videoEl} src={videoUrl} controls playsInline className="w-full rounded-xl mb-2" onTimeUpdate={e=>setCurrentTime(e.target.currentTime)}/>
      {editMode&&(
        <div className="bg-gradient-to-br from-purple-50 to-indigo-50 border-2 border-purple-300 rounded-xl p-2 mb-2">
          <div className="text-[10px] font-bold text-purple-700 mb-2 flex items-center justify-between">
            <span>✏️ NACHTRACKEN · <span className="font-mono bg-purple-200 px-1 rounded">{fmtTime(currentTime)}</span></span>
            <span className="text-gray-500">Pausiere → Aktion → Spieler</span>
          </div>
          {selectedAction&&(<div className="bg-purple-700 text-white text-[10px] font-bold px-2 py-1 rounded-lg mb-2 flex items-center justify-between"><span>② {selectedAction.emoji} {selectedAction.label} → Spieler wählen</span><button onClick={()=>setSelectedAction(null)} className="text-purple-200 ml-2">✕</button></div>)}
          {!selectedAction&&(
            <>
              <div className="text-[10px] font-bold text-gray-500 mb-1">① AKTION WÄHLEN</div>
              <div className="grid grid-cols-3 gap-1 mb-1">
                {[ACTIONS.find(a=>a.type==='kill'),ACTIONS.find(a=>a.type==='block'),ACTIONS.find(a=>a.type==='ace')].map(a=>(
                  <button key={a.type} onClick={()=>setSelectedAction(a)} className={`${a.color} text-white p-1.5 rounded-lg text-center active:scale-90`}><div className="text-base">{a.emoji}</div><div className="text-[8px] font-bold leading-tight">{a.label}</div></button>
                ))}
              </div>
              <div className="grid grid-cols-3 gap-1 mb-1">
                {[ACTIONS.find(a=>a.type==='error'),ACTIONS.find(a=>a.type==='block_error'),ACTIONS.find(a=>a.type==='service_error')].map(a=>(
                  <button key={a.type} onClick={()=>setSelectedAction(a)} className={`${a.color} text-white p-1.5 rounded-lg text-center active:scale-90`}><div className="text-base">{a.emoji}</div><div className="text-[8px] font-bold leading-tight">{a.label}</div></button>
                ))}
              </div>
              <div className="grid grid-cols-3 gap-1">
                {[ACTIONS.find(a=>a.type==='reception_good'),ACTIONS.find(a=>a.type==='reception_bad'),ACTIONS.find(a=>a.type==='attack_attempt')].map(a=>(
                  <button key={a.type} onClick={()=>setSelectedAction(a)}
                    className={`p-1.5 rounded-lg text-center active:scale-90 relative ${a.soft?`${a.color} text-white opacity-40 border-2 border-dashed border-white/70`:`${a.color} text-white`}`}>
                    {a.soft&&<span className="absolute -top-1.5 -right-1.5 bg-gray-600 text-white text-[7px] font-black px-1 py-0.5 rounded-full leading-none">~stat</span>}
                    <div className="text-base">{a.emoji}</div>
                    <div className="text-[8px] font-bold leading-tight">{a.label}</div>
                  </button>
                ))}
              </div>
            </>
          )}
          {selectedAction&&(
            <div className="grid grid-cols-3 gap-1">
              {matchSlots.filter(s=>rosterSnap[s.id]).map(slot=>{
                const p=POSITION_TYPES[slot.type];
                const fakeLineup={};matchSlots.forEach((s,i)=>{fakeLineup[i+1]=s.id;});
                const {suggested}=getSlotSuggestions(selectedAction,fakeLineup);
                const isSuggested=!suggested||suggested.has(slot.id);
                const isOverride=pendingOverride===slot.id;
                const isFlashing=pendingFlash?.slotId===slot.id;
                return(
                  <button key={slot.id} onClick={()=>tapPlayerOnVideo(slot.id)}
                    className={`p-1.5 rounded-xl font-bold text-xs active:scale-90 transition-all relative ${isSuggested?`bg-gradient-to-br ${p.color} text-white ring-2 ring-yellow-300 shadow-lg`:isOverride?`bg-gradient-to-br ${p.color} text-white ring-2 ring-orange-400 shadow-lg`:'bg-gray-100 text-gray-400 opacity-40'} ${isFlashing?'scale-110 ring-4 ring-white':''}`}>
                    <div className="font-black">{slot.short}</div>
                    <div className="text-[9px] truncate">{rosterSnap[slot.id]?.name}</div>
                    {isOverride&&<div className="absolute -bottom-1 left-1/2 -translate-x-1/2 bg-orange-500 text-white text-[7px] font-black px-1 rounded-full whitespace-nowrap">nochmal</div>}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      )}
      {eventsWithTime.length>0&&(
        <>
          <div className="text-xs font-bold text-gray-600 mb-1">📍 {eventsWithTime.length} Events</div>
          <div className="space-y-1 max-h-52 overflow-y-auto">
            {eventsWithTime.map(e=>{
              const label=EVENT_LABELS[e.type]||e.type;
              const outcomeEmoji=['kill','ace','block','opp_error'].includes(e.type)?'🟢':['error','service_error','block_error','reception_bad','opp_point'].includes(e.type)?'🔴':'⚪';
              return(
                <div key={e.id} className="flex items-center gap-1.5 bg-gray-50 rounded-lg px-2 py-1 text-xs">
                  <button onClick={()=>jumpTo(e.videoTime)} className="flex-1 flex items-center gap-1.5 text-left active:scale-95">
                    <span className="font-mono text-[10px] text-purple-600 bg-purple-100 px-1 rounded w-10 flex-shrink-0">{fmtTime(e.videoTime)}</span>
                    <span className="flex-1 font-semibold">{outcomeEmoji} {label}</span>
                    <span className="text-gray-400 text-[10px] truncate">{e.slotShort||''} {e.playerName||'—'}</span>
                    {e.retroactive&&<span className="text-[8px] bg-purple-100 text-purple-600 px-1 rounded">retro</span>}
                  </button>
                  {editMode&&<button onClick={()=>deleteEvent(e.id)} className="text-red-400 flex-shrink-0"><Trash2 size={12}/></button>}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function VolleyballTracker(){
  const [view,setView]=useState('home');
  const [teamConfig,setTeamConfig]=useState(DEFAULT_CONFIG);
  const [roster,setRoster]=useState({});
  const [startingLineup,setStartingLineup]=useState({});
  const [receptionFormations,setReceptionFormations]=useState({});
  const [matches,setMatches]=useState([]);
  const [currentMatch,setCurrentMatch]=useState(null);
  const [loading,setLoading]=useState(true);
  const [editingSlot,setEditingSlot]=useState(null);
  const [nameInput,setNameInput]=useState('');
  const [showNewMatch,setShowNewMatch]=useState(false);
  const [opponentName,setOpponentName]=useState('');
  const [viewingMatch,setViewingMatch]=useState(null);
  const [servingTeam,setServingTeam]=useState('us');
  const [showConfig,setShowConfig]=useState(false);
  const [showLineupEditor,setShowLineupEditor]=useState(false);
  const [formationEditRotation,setFormationEditRotation]=useState(1);
  const [showSettings,setShowSettings]=useState(false);
  const [importMessage,setImportMessage]=useState('');
  const [showPasteImport,setShowPasteImport]=useState(false);
  const [pasteText,setPasteText]=useState('');
  const [matchFormat,setMatchFormat]=useState('bo3');
  const [selectedAction,setSelectedAction]=useState(null);
  const [pendingOverride,setPendingOverride]=useState(null);
  const [pendingFlash,setPendingFlash]=useState(null);
  const [editingVideo,setEditingVideo]=useState(false);
  const [showBench,setShowBench]=useState(false);
  const [subStep,setSubStep]=useState(null);
  const [recordingEnabled,setRecordingEnabled]=useState(false);
  const [isRecording,setIsRecording]=useState(false);
  const [recordingStart,setRecordingStart]=useState(null);
  const [cameraStream,setCameraStream]=useState(null);
  const [cameraPreviewOpen,setCameraPreviewOpen]=useState(false);
  // FIX 2: Snapshot-based undo stack
  const [undoStack,setUndoStack]=useState([]);
  const mediaRecorderRef=useRef(null);
  const recordedChunksRef=useRef([]);
  // Guard: don't auto-save before initial load completes
  const persistReady=useRef(false);

  useEffect(()=>{
    async function load(){
      try{const c=await storage.get('team_config');if(c)setTeamConfig(JSON.parse(c.value));}catch(e){}
      try{const r=await storage.get('roster_v3');if(r)setRoster(JSON.parse(r.value));}catch(e){}
      try{const l=await storage.get('starting_lineup_v2');if(l)setStartingLineup(JSON.parse(l.value));}catch(e){}
      try{const f=await storage.get('reception_formations_v2');if(f)setReceptionFormations(JSON.parse(f.value));}catch(e){}
      try{const m=await storage.get('matches_v3');if(m)setMatches(JSON.parse(m.value));}catch(e){}
      // FIX 1: Restore in-progress match on crash/reload
      try{
        const cm=await storage.get('current_match');
        if(cm&&cm.value&&cm.value!=='null'){
          const parsed=JSON.parse(cm.value);
          setCurrentMatch(parsed);
          const st=await storage.get('serving_team');
          if(st&&st.value)setServingTeam(st.value);
        }
      }catch(e){}
      persistReady.current=true;
      setLoading(false);
    }
    load();
  },[]);

  // FIX 1: Auto-persist currentMatch + servingTeam on every change
  useEffect(()=>{
    if(!persistReady.current)return;
    storage.set('current_match',currentMatch?JSON.stringify(currentMatch):'null');
  },[currentMatch]);
  useEffect(()=>{
    if(!persistReady.current)return;
    storage.set('serving_team',servingTeam);
  },[servingTeam]);

  // ── Recording ──
  const startRecording=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'environment'},audio:false});
      setCameraStream(stream);
      let mime='video/webm;codecs=vp9';
      if(!MediaRecorder.isTypeSupported(mime))mime='video/webm;codecs=vp8';
      if(!MediaRecorder.isTypeSupported(mime))mime='video/webm';
      if(!MediaRecorder.isTypeSupported(mime))mime='video/mp4';
      if(!MediaRecorder.isTypeSupported(mime))return false;
      recordedChunksRef.current=[];
      const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:1500000});
      rec.ondataavailable=e=>{if(e.data.size>0)recordedChunksRef.current.push(e.data);};
      rec.start(1000);
      mediaRecorderRef.current=rec;
      setIsRecording(true);setRecordingStart(Date.now());
      return true;
    }catch(err){return false;}
  };
  const stopRecording=async()=>new Promise(res=>{
    if(!mediaRecorderRef.current){res(null);return;}
    const rec=mediaRecorderRef.current;
    rec.onstop=()=>{
      const blob=new Blob(recordedChunksRef.current,{type:rec.mimeType});
      if(cameraStream)cameraStream.getTracks().forEach(t=>t.stop());
      setCameraStream(null);setIsRecording(false);mediaRecorderRef.current=null;res(blob);
    };
    rec.stop();
  });

  // ── Persistence ──
  const saveConfig=async c=>{setTeamConfig(c);await storage.set('team_config',JSON.stringify(c));};
  const saveRoster=async r=>{setRoster(r);await storage.set('roster_v3',JSON.stringify(r));};
  const saveLineup=async l=>{setStartingLineup(l);await storage.set('starting_lineup_v2',JSON.stringify(l));};
  const saveFormations=async f=>{setReceptionFormations(f);await storage.set('reception_formations_v2',JSON.stringify(f));};
  const saveMatches=async m=>{setMatches(m);await storage.set('matches_v3',JSON.stringify(m));};

  // ── Import / Export ──
  const buildExportData=()=>({version:1,exportDate:new Date().toISOString(),teamConfig,roster,startingLineup,receptionFormations,matches});
  const applyImportData=async(data)=>{
    if(!data.version)throw new Error('Ungültige Daten');
    if(!confirm('⚠️ Aktuelle Daten überschreiben?'))return false;
    if(data.teamConfig)await saveConfig(data.teamConfig);
    if(data.roster)await saveRoster(data.roster);
    if(data.startingLineup)await saveLineup(data.startingLineup);
    if(data.receptionFormations)await saveFormations(data.receptionFormations);
    if(data.matches)await saveMatches(data.matches);
    return true;
  };
  const exportData=()=>{
    const json=JSON.stringify(buildExportData(),null,2);
    try{const blob=new Blob([json],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`vb-backup-${new Date().toISOString().split('T')[0]}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);setImportMessage('✓ Heruntergeladen');}
    catch(e){setImportMessage('✗ Download fehlgeschlagen — nutze Kopieren');}
    setTimeout(()=>setImportMessage(''),3000);
  };
  const exportCopy=async()=>{
    const b64=btoa(unescape(encodeURIComponent(JSON.stringify(buildExportData()))));
    try{await navigator.clipboard.writeText(b64);setImportMessage('✓ In Zwischenablage kopiert');}
    catch(e){setPasteText(b64);setShowPasteImport(true);setImportMessage('📋 Text zum Kopieren markieren');}
    setTimeout(()=>setImportMessage(''),3000);
  };
  const importFromPaste=async()=>{
    if(!pasteText.trim()){setImportMessage('✗ Kein Text eingefügt');setTimeout(()=>setImportMessage(''),3000);return;}
    try{
      let json;try{json=decodeURIComponent(escape(atob(pasteText.trim())));}catch{json=pasteText.trim();}
      const ok=await applyImportData(JSON.parse(json));
      if(ok){setImportMessage('✓ Importiert!');setShowPasteImport(false);setPasteText('');}
    }catch(err){setImportMessage('✗ '+err.message);}
    setTimeout(()=>setImportMessage(''),4000);
  };
  const importData=event=>{
    const file=event.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async e=>{
      try{const ok=await applyImportData(JSON.parse(e.target.result));if(ok)setImportMessage('✓ Importiert!');}
      catch(err){setImportMessage('✗ '+err.message);}
      setTimeout(()=>setImportMessage(''),4000);event.target.value='';
    };
    reader.readAsText(file);
  };

  const slots=generateSlots(teamConfig);
  const assignedSlots=slots.filter(s=>roster[s.id]);
  const setPlayerName=(slotId,name)=>{
    const nr={...roster};
    if(!name.trim()){delete nr[slotId];const nl={...startingLineup};Object.entries(nl).forEach(([p,s])=>{if(s===slotId)delete nl[p];});saveLineup(nl);}
    else nr[slotId]={name:name.trim()};
    saveRoster(nr);setEditingSlot(null);setNameInput('');
  };
  const updateConfigCount=(type,delta)=>{const c=teamConfig[type]||0;saveConfig({...teamConfig,[type]:Math.max(0,Math.min(6,c+delta))});};
  const assignToPosition=(pos,slotId)=>{const nl={};Object.entries(startingLineup).forEach(([p,s])=>{if(s!==slotId)nl[p]=s;});nl[pos]=slotId;saveLineup(nl);};
  const lineupComplete=[1,2,3,4,5,6].every(p=>startingLineup[p]);

  const startNewMatch=async()=>{
    if(!opponentName.trim())return;
    let recStarted=false;
    if(recordingEnabled){recStarted=await startRecording();if(!recStarted&&!confirm('Aufnahme fehlgeschlagen. Ohne Video starten?'))return;}
    const maxSets=matchFormat==='bo1'?1:matchFormat==='bo3'?3:5;
    const setsToWin=matchFormat==='bo1'?1:matchFormat==='bo3'?2:3;
    const match={
      id:Date.now().toString(),opponent:opponentName.trim(),date:new Date().toISOString(),
      events:[],set:1,rotation:1,teamScore:0,opponentScore:0,setScores:[],
      rosterSnapshot:{...roster},lineupSnapshot:{...startingLineup},
      configSnapshot:{...teamConfig},formationsSnapshot:{...receptionFormations},
      format:matchFormat,maxSets,setsToWin,hasVideo:recStarted,videoStartTime:recStarted?Date.now():null,
    };
    setCurrentMatch(match);setServingTeam('us');setShowNewMatch(false);setOpponentName('');setSelectedAction(null);
    setUndoStack([]); // clear any leftover undo state
    if(recStarted)setCameraPreviewOpen(true);
    setView('match');
  };

  const updateMatch=fn=>setCurrentMatch(prev=>fn(prev));

  // FIX 2: Push snapshot before any mutation
  const pushUndo=()=>setUndoStack(prev=>[...prev.slice(-29),{match:currentMatch,servingTeam}]);

  const recordEventForPlayer=(slotId)=>{
    if(!selectedAction||!currentMatch)return;
    const action=selectedAction;
    const matchSlotsLocal=generateSlots(currentMatch.configSnapshot);
    const lineupLocal=getEffectiveLineup(currentMatch.lineupSnapshot,matchSlotsLocal,currentMatch.rotation);
    const {suggested}=getSlotSuggestions(action,lineupLocal,servingTeam);
    if(suggested&&!suggested.has(slotId)){
      if(pendingOverride===slotId){setPendingOverride(null);}
      else{setPendingOverride(slotId);return;}
    }else{setPendingOverride(null);}
    pushUndo(); // ← snapshot BEFORE mutation
    const videoTime=isRecording&&recordingStart?Math.floor((Date.now()-recordingStart)/1000):null;
    const slot=matchSlotsLocal.find(s=>s.id===slotId);
    const event={
      id:Date.now().toString()+Math.random(),
      slotId:action.forTeam?slotId:null,playerName:action.forTeam?currentMatch.rosterSnapshot[slotId]?.name:null,
      slotShort:action.forTeam?slot?.short:null,type:action.type,forTeam:action.forTeam,
      set:currentMatch.set,rotation:currentMatch.rotation,serving:servingTeam,timestamp:Date.now(),videoTime,
    };
    let td=0,od=0,rotateUs=false,newServing=servingTeam;
    if(['kill','ace','block'].includes(action.type)){td=1;if(servingTeam==='opp'){rotateUs=true;newServing='us';}}
    if(['error','service_error','block_error','reception_bad'].includes(action.type)){od=1;newServing='opp';}
    updateMatch(m=>({...m,events:[...m.events,event],teamScore:m.teamScore+td,opponentScore:m.opponentScore+od,rotation:rotateUs?(m.rotation%6)+1:m.rotation}));
    setServingTeam(newServing);
    setPendingFlash({slotId,type:action.type});setTimeout(()=>setPendingFlash(null),600);
    setSelectedAction(null);
  };

  // FIX 3: Smart score buttons – our "+" = opponent error/fault, logs event + correct rotation
  const recordOurPoint=()=>{
    if(!currentMatch)return;
    pushUndo();
    const videoTime=isRecording&&recordingStart?Math.floor((Date.now()-recordingStart)/1000):null;
    const event={id:Date.now().toString()+Math.random(),type:'opp_error',forTeam:false,set:currentMatch.set,rotation:currentMatch.rotation,serving:servingTeam,timestamp:Date.now(),videoTime};
    const rotateUs=servingTeam==='opp';
    updateMatch(m=>({...m,events:[...m.events,event],teamScore:m.teamScore+1,rotation:rotateUs?(m.rotation%6)+1:m.rotation}));
    setServingTeam('us');
  };
  // Smart opp "+" = opponent wins rally, logs event + serving switch
  const recordOppPoint=()=>{
    if(!currentMatch)return;
    pushUndo();
    const videoTime=isRecording&&recordingStart?Math.floor((Date.now()-recordingStart)/1000):null;
    const event={id:Date.now().toString()+Math.random(),type:'opp_point',forTeam:false,set:currentMatch.set,rotation:currentMatch.rotation,serving:servingTeam,timestamp:Date.now(),videoTime};
    updateMatch(m=>({...m,events:[...m.events,event],opponentScore:m.opponentScore+1}));
    setServingTeam('opp');
  };

  const doSubstitution=(fieldSlotId,benchSlotId)=>{
    pushUndo(); // ← snapshot before sub
    updateMatch(m=>{
      const newLineup={...m.lineupSnapshot};
      const pos=Object.entries(newLineup).find(([_,s])=>s===fieldSlotId)?.[0];
      if(pos)newLineup[pos]=benchSlotId;
      return{...m,lineupSnapshot:newLineup,substitutions:[...(m.substitutions||[]),{out:fieldSlotId,in:benchSlotId,set:m.set,rotation:m.rotation}]};
    });
    setSubStep(null);setShowBench(false);
  };

  // FIX 2: Snapshot-based undo – restores full match state + servingTeam
  const undoLastEvent=()=>{
    if(undoStack.length===0)return;
    const snap=undoStack[undoStack.length-1];
    setCurrentMatch(snap.match);
    setServingTeam(snap.servingTeam);
    setUndoStack(prev=>prev.slice(0,-1));
    setSelectedAction(null);
  };

  const manualRotate=()=>{pushUndo();updateMatch(m=>({...m,rotation:(m.rotation%6)+1}));};

  const nextSet=()=>{
    pushUndo();
    updateMatch(m=>({...m,set:m.set+1,setScores:[...m.setScores,{teamScore:m.teamScore,opponentScore:m.opponentScore}],teamScore:0,opponentScore:0,rotation:1}));
    setServingTeam('us');setSelectedAction(null);
  };

  const finishMatch=async()=>{
    let videoBlob=null;if(isRecording)videoBlob=await stopRecording();
    const finalMatch={...currentMatch,setScores:[...currentMatch.setScores,{teamScore:currentMatch.teamScore,opponentScore:currentMatch.opponentScore}],finished:true};
    if(videoBlob){try{await videoDB.save(finalMatch.id,videoBlob);}catch(e){}}
    await saveMatches([finalMatch,...matches]);
    setCurrentMatch(null);setSelectedAction(null);setUndoStack([]);setView('home');
  };
  const cancelMatch=async()=>{
    if(confirm('Spiel verwerfen?')){
      if(isRecording)await stopRecording();
      setCurrentMatch(null);setSelectedAction(null);setUndoStack([]);setView('home');
    }
  };

  if(loading)return(
    <div className="min-h-screen bg-gradient-to-br from-purple-600 via-pink-500 to-orange-400 flex items-center justify-center">
      <div className="text-white text-xl font-bold animate-pulse">Lade... 🏐</div>
    </div>
  );

  // ═══ HOME ════════════════════════════════════════════════════════════════════
  if(view==='home')return(
    <div className="min-h-screen bg-gradient-to-br from-purple-600 via-pink-500 to-orange-400 p-4">
      <div className="max-w-md mx-auto">
        <div className="flex justify-end pt-2">
          <button onClick={()=>setShowSettings(true)} className="bg-white/20 text-white p-2 rounded-full active:scale-95"><Settings size={18}/></button>
        </div>
        <div className="text-center py-4">
          <div className="text-6xl mb-2">🏐</div>
          <h1 className="text-4xl font-black text-white drop-shadow-lg">Coach Tracker</h1>
          <p className="text-white/90 font-semibold text-sm">Lokale App · Offline · 🎬 Video</p>
        </div>
        {currentMatch&&(
          <button onClick={()=>setView('match')} className="w-full bg-gradient-to-r from-green-400 to-emerald-500 text-white p-5 rounded-3xl shadow-xl mb-4 font-bold active:scale-95 animate-pulse">
            ▶️ Laufendes Spiel fortsetzen<br/><span className="text-sm opacity-90">vs {currentMatch.opponent} · Satz {currentMatch.set} {isRecording&&'· 🔴 REC'}</span>
          </button>
        )}
        <div className="grid grid-cols-2 gap-3 mb-4">
          <button onClick={()=>setShowNewMatch(true)} disabled={!lineupComplete} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95 disabled:opacity-50">
            <div className="text-4xl mb-1">🚀</div><div className="font-black text-purple-700">Neues Spiel</div>
          </button>
          <button onClick={()=>setView('roster')} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95">
            <div className="text-4xl mb-1">👥</div><div className="font-black text-pink-600">Kader</div>
            <div className="text-xs text-gray-500">{assignedSlots.length} Spieler</div>
          </button>
          <button onClick={()=>setView('lineup')} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95">
            <div className="text-4xl mb-1">📋</div><div className="font-black text-indigo-600">Aufstellung</div>
            <div className="text-xs text-gray-500">{lineupComplete?'✓ Bereit':`${Object.keys(startingLineup).length}/6`}</div>
          </button>
          <button onClick={()=>{setView('formations');setFormationEditRotation(1);}} disabled={!lineupComplete} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95 disabled:opacity-50">
            <div className="text-4xl mb-1">🎯</div><div className="font-black text-cyan-700">Annahme</div>
            <div className="text-xs text-gray-500">{Object.keys(receptionFormations).length}/6 Z-Pos.</div>
          </button>
          <button onClick={()=>setView('stats')} className="bg-white/95 p-5 rounded-3xl shadow-xl active:scale-95 col-span-2">
            <div className="text-4xl mb-1">📊</div><div className="font-black text-orange-600">Statistiken & Historie</div>
            <div className="text-xs text-gray-500">{matches.length} Spiele · {matches.filter(m=>m.hasVideo).length} mit Video 🎬</div>
          </button>
        </div>
      </div>
      {showSettings&&(
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50" onClick={()=>setShowSettings(false)}>
          <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
            <h2 className="text-2xl font-black text-gray-800 mb-4">⚙️ Einstellungen</h2>
            <div className="space-y-3">
              <div className="bg-gray-50 p-3 rounded-2xl">
                <div className="text-xs font-bold text-gray-700 mb-1">💾 DATEN-BACKUP</div>
                <div className="text-[10px] text-gray-500 mb-2">Export → auf zweitem Gerät importieren</div>
                <div className="grid grid-cols-2 gap-2 mb-2">
                  <button onClick={exportData} className="bg-gradient-to-r from-blue-500 to-cyan-600 text-white p-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 active:scale-95"><Download size={13}/> Download</button>
                  <button onClick={exportCopy} className="bg-gradient-to-r from-indigo-500 to-purple-600 text-white p-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 active:scale-95">📋 Kopieren</button>
                </div>
                <div className="text-[10px] text-gray-500 mb-2">Import</div>
                <div className="grid grid-cols-2 gap-2">
                  <label className="bg-gradient-to-r from-purple-500 to-pink-600 text-white p-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 active:scale-95 cursor-pointer">
                    <Upload size={13}/> Datei<input type="file" accept=".json,.txt,application/json,text/plain,text/*" onChange={importData} className="hidden"/>
                  </label>
                  <button onClick={()=>{setPasteText('');setShowPasteImport(true);}} className="bg-gradient-to-r from-pink-500 to-rose-500 text-white p-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 active:scale-95">📥 Einfügen</button>
                </div>
                {importMessage&&<div className={`mt-2 p-2 rounded-lg text-xs font-bold text-center ${importMessage.startsWith('✓')?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}`}>{importMessage}</div>}
              </div>
              <div className="bg-red-50 p-3 rounded-2xl">
                <div className="text-xs font-bold text-red-700 mb-2">⚠️ GEFAHRENZONE</div>
                <button onClick={async()=>{if(confirm('ALLE Daten löschen?')){if(confirm('Sicher?')){localStorage.clear();location.reload();}}}} className="w-full bg-red-600 text-white p-3 rounded-xl font-bold text-sm">🗑️ Alle Daten löschen</button>
              </div>
            </div>
            <button onClick={()=>setShowSettings(false)} className="w-full mt-4 bg-gray-200 text-gray-700 p-3 rounded-2xl font-bold">Schließen</button>
          </div>
        </div>
      )}
      {showPasteImport&&(
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl">
            <h2 className="text-xl font-black text-purple-700 mb-1">📥 Text importieren</h2>
            <p className="text-xs text-gray-500 mb-3">Füge den kopierten Backup-Text hier ein.</p>
            <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="Backup-Text hier einfügen…" className="w-full h-28 p-3 border-2 border-purple-200 rounded-xl text-xs font-mono resize-none focus:outline-none focus:border-purple-500 mb-3" autoFocus/>
            {importMessage&&<div className={`mb-3 p-2 rounded-lg text-xs font-bold text-center ${importMessage.startsWith('✓')?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}`}>{importMessage}</div>}

                const selectable=isPosSelectable();
                const suggested=isPosSuggested(posNum);
                const dimmed=selectedAction&&selectable&&!suggested;
                const isOverridePending=pendingOverride===slotId;
                const isFlashing=pendingFlash?.slotId===slotId;
                let ringClass='';
                if(suggested&&selectable)ringClass='ring-4 ring-yellow-300 highlight-pulse';
                if(isOverridePending)ringClass='ring-4 ring-orange-400 highlight-pulse';
                if(isSetter&&!selectedAction)ringClass='ring-2 ring-yellow-400';
                if(isServing&&!selectedAction)ringClass='ring-4 ring-green-400';
                if(isFlashing)ringClass='ring-4 ring-white';
                return(
                  <div key={pos} onClick={()=>{if(selectable)recordEventForPlayer(slotId);}}
                    className={`absolute transform -translate-x-1/2 -translate-y-1/2 z-10 transition-all duration-300 ${selectable?'active:scale-90 cursor-pointer':''} ${dimmed&&!isOverridePending?'player-dim':''}`}
                    style={{left:`${coords.x}%`,top:`${coords.y}%`}}>
                    <div className="relative">
                      <div className={`w-[55px] h-[55px] bg-gradient-to-br ${p.color} rounded-full flex flex-col items-center justify-center text-white shadow-xl ${ringClass} ${suggested&&selectable?'scale-110':''} transition-all duration-200`}>
                        {isSetter&&<div className="absolute -top-1 -right-1"><Star size={10} fill="#fbbf24"/></div>}
                        <div className="text-[11px] font-black">{slot.short}</div>
                        {isFlashing&&<div className="absolute inset-0 bg-white/50 rounded-full animate-ping"></div>}
                      </div>
                      {isOverridePending&&<div className="absolute -bottom-1 left-1/2 -translate-x-1/2 bg-orange-500 text-white text-[8px] font-black px-1 rounded-full whitespace-nowrap">nochmal tippen</div>}
                      {player&&<div className="text-[10px] text-center font-black text-gray-900 mt-1 max-w-[65px] truncate bg-white/80 rounded px-1">{player.name}</div>}
                      <div className="absolute -top-1.5 -left-1.5 w-4 h-4 bg-white border border-orange-400 text-orange-600 rounded-full flex items-center justify-center text-[9px] font-black">{posNum}</div>
                    </div>
                  </div>
                );
              })}
              {selectedAction&&(
                <div className="absolute bottom-2 left-0 right-0 text-center pointer-events-none">
                  <span className="bg-purple-700/80 text-white text-[10px] font-bold px-3 py-1 rounded-full">{selectedAction.emoji} {selectedAction.label} → Spieler antippen</span>
                </div>
              )}
            </div>
          </div>

          {/* Bench panel */}
          {(()=>{
            const onField=new Set(Object.values(trueLineup));
            const benchSlots=matchSlots.filter(s=>rosterSnap[s.id]&&!onField.has(s.id));
            if(benchSlots.length===0)return null;
            return(
              <div className="bg-white/95 rounded-2xl shadow-xl mb-3 overflow-hidden">
                <button onClick={()=>{setShowBench(v=>!v);setSubStep(null);}} className="w-full flex items-center justify-between px-4 py-3 active:bg-gray-50">
                  <div className="flex items-center gap-2">
                    <span className="text-lg">🪑</span>
                    <span className="font-black text-gray-700 text-sm">Bank ({benchSlots.length})</span>
                    {subStep&&<span className="bg-yellow-400 text-yellow-900 text-[10px] font-black px-2 py-0.5 rounded-full">Feldsp. wählen</span>}
                  </div>
                  <span className="text-gray-400 text-xs">{showBench?'▲':'▼'}</span>
                </button>
                {showBench&&(
                  <div className="px-3 pb-3 border-t border-gray-100">
                    {!subStep&&(
                      <>
                        <div className="text-[10px] font-bold text-gray-400 mt-2 mb-1.5">① BANKSP. WÄHLEN (kommt rein)</div>
                        <div className="grid grid-cols-3 gap-1.5">
                          {benchSlots.map(slot=>{
                            const p=POSITION_TYPES[slot.type];
                            return(
                              <button key={slot.id} onClick={()=>setSubStep({benchSlotId:slot.id})} className={`p-2 rounded-xl font-bold text-xs active:scale-90 bg-gradient-to-br ${p.color} text-white`}>
                                <div className="font-black text-sm">{slot.short}</div>
                                <div className="text-[9px] truncate">{rosterSnap[slot.id]?.name}</div>
                              </button>
                            );
                          })}
                        </div>
                      </>
                    )}
                    {subStep&&(()=>{
                      const benchSlot=matchSlots.find(s=>s.id===subStep.benchSlotId);
                      const incomingP=POSITION_TYPES[benchSlot.type];
                      const fieldCandidates=Object.entries(lineup).map(([pos,slotId])=>{
                        const slot=matchSlots.find(s=>s.id===slotId);if(!slot)return null;
                        return{pos:parseInt(pos),slot,slotId};
                      }).filter(Boolean);
                      return(
                        <>
                          <div className="flex items-center gap-2 mt-2 mb-1.5">
                            <div className={`bg-gradient-to-br ${incomingP.color} text-white px-2 py-1 rounded-lg text-xs font-black`}>{benchSlot.short} {rosterSnap[subStep.benchSlotId]?.name} ↓</div>
                            <div className="text-[10px] font-bold text-gray-400 flex-1">② FELDSP. WÄHLEN (geht raus)</div>
                            <button onClick={()=>setSubStep(null)} className="text-gray-400 text-xs">✕</button>
                          </div>
                          <div className="grid grid-cols-3 gap-1.5">
                            {fieldCandidates.map(({pos,slot,slotId})=>{
                              const p=POSITION_TYPES[slot.type];
                              return(
                                <button key={slotId} onClick={()=>doSubstitution(slotId,subStep.benchSlotId)} className={`p-2 rounded-xl font-bold text-xs active:scale-90 bg-gradient-to-br ${p.color} text-white ring-2 ring-yellow-300`}>
                                  <div className="text-[9px] text-white/70">Pos {pos}</div>
                                  <div className="font-black text-sm">{slot.short}</div>
                                  <div className="text-[9px] truncate">{rosterSnap[slotId]?.name}</div>
                                </button>
                              );
                            })}
                          </div>
                        </>
                      );
                    })()}
                  </div>
                )}
              </div>
            );
          })()}

          {/* Controls */}
          <div className="grid grid-cols-2 gap-2 mb-3">
            <button onClick={undoLastEvent} disabled={undoStack.length===0} className="bg-gray-700 text-white p-3 rounded-2xl font-bold disabled:opacity-40">↶ Rückgängig {undoStack.length>0&&<span className="text-xs opacity-70">({undoStack.length})</span>}</button>
            {matchWonBy
              ?<button onClick={finishMatch} className="bg-gradient-to-r from-yellow-400 to-orange-500 text-white p-3 rounded-2xl font-black animate-pulse">🏆 Match beenden</button>
              :<button onClick={()=>{if(!setWonBy&&!confirm('Satz noch nicht gewonnen. Weiter?'))return;nextSet();}} disabled={currentMatch.set>=currentMatch.maxSets} className="bg-gradient-to-r from-yellow-400 to-orange-500 text-white p-3 rounded-2xl font-bold disabled:opacity-40">
                {setWonBy?`✓ Satz ${currentMatch.set+1} →`:`Satz ${currentMatch.set+1} →`}
              </button>
            }
          </div>

          {/* Event log */}
          {currentMatch.events.length>0&&(
            <div className="bg-white/95 rounded-2xl p-3 shadow-xl">
              <div className="text-xs font-bold text-gray-600 mb-2">📜 LETZTE</div>
              <div className="space-y-1 max-h-28 overflow-y-auto">
                {currentMatch.events.slice(-5).reverse().map(e=>{
                  const label=EVENT_LABELS[e.type]||e.type;
                  return(
                    <div key={e.id} className="text-xs flex justify-between bg-gray-50 rounded-lg px-2 py-1">
                      <span className="font-semibold">{label}</span>
                      <span className="text-gray-500 truncate ml-2 flex items-center gap-1">
                        {e.slotId?`${matchSlots.find(s=>s.id===e.slotId)?.short} · ${e.playerName}`:'—'}
                        {e.videoTime!=null&&<span className="text-purple-400 font-mono text-[9px]">🎬{fmtTime(e.videoTime)}</span>}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        {/* Camera preview */}
        {isRecording&&cameraStream&&(
          <div className="fixed z-40 bottom-4 right-4">
            {cameraPreviewOpen?(
              <div className="bg-black rounded-2xl shadow-2xl overflow-hidden border-2 border-white/30" style={{width:'180px'}}>
                <div className="flex items-center justify-between px-2 py-1 bg-black/80">
                  <div className="flex items-center gap-1"><span className="w-2 h-2 bg-red-500 rounded-full animate-pulse inline-block"></span><span className="text-white text-[10px] font-black">LIVE</span></div>
                  <button onClick={()=>setCameraPreviewOpen(false)} className="text-white/70 text-xs font-bold">▼ einklappen</button>
                </div>
                <video autoPlay playsInline muted className="w-full block" style={{height:'101px',objectFit:'cover'}} ref={el=>{if(el&&el.srcObject!==cameraStream)el.srcObject=cameraStream;}}/>
              </div>
            ):(
              <button onClick={()=>setCameraPreviewOpen(true)} className="flex items-center gap-1.5 bg-black/80 border-2 border-red-500 text-white px-3 py-1.5 rounded-full shadow-xl text-xs font-black animate-pulse">
                <span className="w-2 h-2 bg-red-500 rounded-full inline-block"></span>REC · Vorschau
              </button>
            )}
          </div>
        )}
      </div>
    );
  }

  // ═══ STATS ════════════════════════════════════════════════════════════════════
  if(view==='stats'){
    if(viewingMatch){
      const m=viewingMatch;
      const matchSlots=generateSlots(m.configSnapshot||DEFAULT_CONFIG);
      const bySlot={};
      m.events.forEach(e=>{if(!e.slotId)return;if(!bySlot[e.slotId])bySlot[e.slotId]={};bySlot[e.slotId][e.type]=(bySlot[e.slotId][e.type]||0)+1;});
      return(
        <div className="min-h-screen bg-gradient-to-br from-orange-400 via-pink-500 to-purple-600 p-4">
          <div className="max-w-md mx-auto">
            <div className="flex items-center gap-3 mb-4 pt-2">
              <button onClick={()=>{setViewingMatch(null);setEditingVideo(false);}} className="bg-white/20 p-2 rounded-full"><ArrowLeft/></button>
              <h1 className="text-2xl font-black text-white flex-1">vs {m.opponent}</h1>
              {m.hasVideo&&<span className="text-white text-sm">🎬</span>}
            </div>
            <div className="bg-white/95 rounded-2xl p-4 shadow-xl mb-3">
              <div className="text-xs text-gray-500 mb-2">{new Date(m.date).toLocaleDateString('de-DE')}</div>
              {m.setScores.map((s,i)=>(
                <div key={i} className="flex justify-between font-bold">
                  <span>Satz {i+1}</span>
                  <span className={s.teamScore>s.opponentScore?'text-green-600':'text-red-500'}>{s.teamScore} : {s.opponentScore}</span>
                </div>
              ))}
            </div>
            {m.hasVideo&&(
              <MatchVideoPlayer matchId={m.id} events={m.events} matchSlots={matchSlots} rosterSnap={m.rosterSnapshot} matchSetScores={m.setScores}
                editMode={editingVideo} onToggleEdit={()=>setEditingVideo(v=>!v)}
                onEventsChange={async newEvents=>{const updated={...m,events:newEvents};const nm=matches.map(x=>x.id===m.id?updated:x);await saveMatches(nm);setViewingMatch(updated);}}
                onSetScoresChange={async newSetScores=>{const updated={...m,setScores:newSetScores};const nm=matches.map(x=>x.id===m.id?updated:x);await saveMatches(nm);setViewingMatch(updated);}}/>
            )}
            <div className="bg-white/95 rounded-2xl p-4 shadow-xl">
              <h3 className="font-black text-purple-700 mb-3">📊 Nach Spieler</h3>
              {Object.entries(bySlot).map(([slotId,s])=>{
                const slot=matchSlots.find(x=>x.id===slotId);if(!slot)return null;
                const p=POSITION_TYPES[slot.type];const player=m.rosterSnapshot[slotId];
                return(
                  <div key={slotId} className="mb-3 pb-3 border-b last:border-b-0">
                    <div className="flex items-center gap-2 mb-1">
                      <div className={`w-8 h-8 bg-gradient-to-br ${p.color} rounded-lg flex items-center justify-center text-white text-xs font-black`}>{slot.short}</div>
                      <div className="font-bold">{player?.name}</div>
                    </div>
                    <div className="grid grid-cols-4 gap-1 text-xs">
                      <div className="bg-green-100 p-1 rounded text-center">💥 {s.kill||0}</div>
                      <div className="bg-blue-100 p-1 rounded text-center">🎯 {s.ace||0}</div>
                      <div className="bg-purple-100 p-1 rounded text-center">🧱 {s.block||0}</div>
                      <div className="bg-red-100 p-1 rounded text-center">❌ {s.error||0}</div>
                      <div className="bg-orange-100 p-1 rounded text-center">📉 {s.service_error||0}</div>
                      <div className="bg-pink-100 p-1 rounded text-center">🚫 {s.block_error||0}</div>
                      <div className="bg-teal-100 p-1 rounded text-center">⚔️ {s.attack_attempt||0}</div>
                      <div className="bg-lime-100 p-1 rounded text-center">✅ {s.reception_good||0}</div>
                      <div className="bg-amber-100 p-1 rounded text-center">⚠️ {s.reception_bad||0}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }
    return(
      <div className="min-h-screen bg-gradient-to-br from-orange-400 via-pink-500 to-purple-600 p-4">
        <div className="max-w-md mx-auto">
          <div className="flex items-center gap-3 mb-4 pt-2">
            <button onClick={()=>setView('home')} className="bg-white/20 p-2 rounded-full"><ArrowLeft/></button>
            <h1 className="text-3xl font-black text-white">📊 Historie</h1>
          </div>
          {matches.length===0
            ?<div className="bg-white/95 rounded-2xl p-8 text-center shadow-xl"><div className="text-5xl mb-3">🏐</div><div className="font-bold text-gray-700">Noch keine Spiele</div></div>
            :<div className="bg-white/95 rounded-2xl p-4 shadow-xl">
              <div className="space-y-2">
                {matches.map(m=>{
                  const setsWon=m.setScores.filter(s=>s.teamScore>s.opponentScore).length;
                  const setsLost=m.setScores.length-setsWon;const won=setsWon>setsLost;
                  return(
                    <div key={m.id} className="flex items-center gap-2">
                      <button onClick={()=>{setViewingMatch(m);setEditingVideo(false);}} className={`flex-1 p-3 rounded-xl text-left ${won?'bg-gradient-to-r from-green-100 to-emerald-100':'bg-gradient-to-r from-red-100 to-rose-100'}`}>
                        <div className="flex justify-between items-center">
                          <div>
                            <div className="font-bold text-gray-800 flex items-center gap-1">vs {m.opponent}{m.hasVideo&&<span className="text-pink-600">🎬</span>}</div>
                            <div className="text-xs text-gray-500">{new Date(m.date).toLocaleDateString('de-DE')}</div>
                          </div>
                          <div className={`font-black text-lg ${won?'text-green-700':'text-red-600'}`}>{setsWon}:{setsLost}</div>
                        </div>
                      </button>
                      <button onClick={async()=>{if(confirm('Löschen?')){if(m.hasVideo){try{await videoDB.delete(m.id);}catch(e){}}await saveMatches(matches.filter(x=>x.id!==m.id));}}} className="text-red-500 p-2"><Trash2 size={18}/></button>
                    </div>
                  );
                })}
              </div>
            </div>
          }
        </div>
      </div>
    );
  }
  return null;
}

// ═══ FormationsEditor ═════════════════════════════════════════════════════════
function FormationsEditor({rotation:setterRotation,setRotation:setSetterRotation,startingLineup,roster,slots,receptionFormations,saveFormations,onBack}){
  const courtRef=useRef(null);
  const [localFormation,setLocalFormation]=useState(()=>receptionFormations[setterRotation]||getDefaultReception());
  const [dirty,setDirty]=useState(false);
  const [draggingPos,setDraggingPos]=useState(null);
  useEffect(()=>{setLocalFormation(receptionFormations[setterRotation]||getDefaultReception());setDirty(false);},[setterRotation,receptionFormations]);
  const internalRotation=setterRotToInternal(setterRotation);
  const lineup=getLineupForRotation(startingLineup,internalRotation);
  const handlePointerDown=(pos,e)=>{e.preventDefault();setDraggingPos(pos);};
  const handlePointerMove=e=>{
    if(draggingPos===null||!courtRef.current)return;e.preventDefault();
    const rect=courtRef.current.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;
    const x=Math.max(5,Math.min(95,((cx-rect.left)/rect.width)*100));const y=Math.max(5,Math.min(95,((cy-rect.top)/rect.height)*100));
    setLocalFormation(prev=>({...prev,[draggingPos]:{x,y}}));setDirty(true);
  };
  const handlePointerUp=()=>setDraggingPos(null);
  useEffect(()=>{
    if(draggingPos!==null){
      const move=e=>handlePointerMove(e);const up=()=>handlePointerUp();
      window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
      window.addEventListener('touchmove',move,{passive:false});window.addEventListener('touchend',up);
      return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);window.removeEventListener('touchmove',move);window.removeEventListener('touchend',up);};
    }
  },[draggingPos]);
  return(
    <div className="min-h-screen bg-gradient-to-br from-cyan-600 via-blue-600 to-indigo-700 p-4">
      <div className="max-w-md mx-auto">
        <div className="flex items-center gap-3 mb-4 pt-2">
          <button onClick={onBack} className="bg-white/20 p-2 rounded-full"><ArrowLeft/></button>
          <h1 className="text-2xl font-black text-white flex-1">🎯 Annahme-Formation</h1>
        </div>
        <div className="bg-white/95 rounded-2xl p-3 shadow-xl mb-3">
          <div className="text-xs font-bold text-gray-600 mb-2">ZUSPIELER (Z) AUF POSITION</div>
          <div className="grid grid-cols-6 gap-1">
            {[1,6,5,4,3,2].map((n,idx)=>{
              const saved=receptionFormations[n];
              return(
                <button key={n} onClick={()=>setSetterRotation(n)} className={`p-2 rounded-xl font-black text-sm transition relative ${setterRotation===n?'bg-gradient-to-br from-yellow-400 to-orange-500 text-white shadow-lg scale-105':'bg-gray-100 text-gray-700'}`}>
                  <div className="text-[9px] opacity-70 font-normal">{idx+1}.</div>{n}
                  {saved&&<div className="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>}
                </button>
              );
            })}
          </div>
        </div>
        <div className="bg-white/95 rounded-2xl p-3 shadow-xl mb-3">
          <div className="text-xs font-bold text-cyan-800 mb-2 text-center">✋ Ziehe die Spieler für Z auf Pos {setterRotation}</div>
          <div ref={courtRef} className="relative bg-gradient-to-b from-orange-100 via-yellow-50 to-orange-100 rounded-xl border-2 border-orange-400 overflow-hidden touch-none" style={{height:'400px'}}>
            <div className="absolute top-0 left-0 right-0 h-1 bg-gray-700"></div>
            <div className="absolute top-1 left-0 right-0 text-center text-[9px] font-bold text-gray-600">— NETZ —</div>
            <div className="absolute top-[47%] left-0 right-0 border-t-2 border-dashed border-orange-400"></div>
            {Object.entries(lineup).map(([pos,slotId])=>{
              const posNum=parseInt(pos);const slot=slots.find(s=>s.id===slotId);if(!slot)return null;
              const p=POSITION_TYPES[slot.type];const player=roster[slotId];
              const coords=localFormation[posNum]||{x:50,y:50};const isDragging=draggingPos===posNum;
              return(
                <div key={pos} onMouseDown={e=>handlePointerDown(posNum,e)} onTouchStart={e=>handlePointerDown(posNum,e)}
                  className="absolute transform -translate-x-1/2 -translate-y-1/2 z-10 cursor-grab active:cursor-grabbing select-none"
                  style={{left:`${coords.x}%`,top:`${coords.y}%`,transition:isDragging?'none':'all 0.3s ease',touchAction:'none'}}>
                  <div className={`relative ${isDragging?'scale-110':''}`}>
                    <div className={`w-[60px] h-[60px] bg-gradient-to-br ${p.color} rounded-full flex flex-col items-center justify-center text-white shadow-xl ${isDragging?'ring-4 ring-white':''}`}>
                      {slot.type==='S'&&<div className="absolute -top-1 -right-1"><Star size={10} fill="#fbbf24"/></div>}
                      <div className="text-[11px] font-black">{slot.short}</div>
                    </div>
                    {player&&<div className="text-[10px] text-center font-black text-gray-900 mt-1 max-w-[70px] truncate bg-white/90 rounded px-1 pointer-events-none">{player.name}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <button onClick={()=>{if(confirm('Reset?')){setLocalFormation(getDefaultReception());setDirty(true);}}} className="bg-gray-200 text-gray-700 p-3 rounded-2xl font-bold active:scale-95 flex items-center justify-center gap-2"><RefreshCw size={16}/> Reset</button>
          <button onClick={()=>{saveFormations({...receptionFormations,[setterRotation]:localFormation});setDirty(false);}} disabled={!dirty} className="bg-gradient-to-r from-green-500 to-emerald-600 text-white p-3 rounded-2xl font-bold active:scale-95 disabled:opacity-40 flex items-center justify-center gap-2"><Save size={16}/> Speichern</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<VolleyballTracker/>);
</script>
</body>
</html>
